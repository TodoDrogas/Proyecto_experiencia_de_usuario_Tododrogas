name: "Deploy PQR Produccion - Tododrogas"

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout codigo
        uses: actions/checkout@v4

      # ── config.js — escrito con printf, sin heredoc (evita error YAML con ${{ }}) ──
      - name: Generar config.js
        env:
          SB_URL:        ${{ secrets.SUPABASE_URL }}
          SB_KEY:        ${{ secrets.SUPABASE_KEY }}
          AZ_TENANT:     ${{ secrets.AZURE_TENANT_ID }}
          AZ_CLIENT:     ${{ secrets.AZURE_CLIENT_ID }}
          AZ_SECRET:     ${{ secrets.AZURE_CLIENT_SECRET }}
          GRAPH_USER:    ${{ secrets.GRAPH_USER_ID }}
          N8N_BASE:      ${{ secrets.N8N_WEBHOOK_BASE }}
          OAI_KEY:       ${{ secrets.OPENAI_KEY }}
          ADM_USER:      ${{ secrets.ADMIN_USER }}
          ADM_PASS:      ${{ secrets.ADMIN_PASS }}
        run: |
          {
            echo "window.SUPABASE_URL        = '${SB_URL}';"
            echo "window.SUPABASE_KEY        = '${SB_KEY}';"
            echo "window.AZURE_TENANT_ID     = '${AZ_TENANT}';"
            echo "window.AZURE_CLIENT_ID     = '${AZ_CLIENT}';"
            echo "window.AZURE_CLIENT_SECRET = '${AZ_SECRET}';"
            echo "window.GRAPH_USER_ID       = '${GRAPH_USER}';"
            echo "window.N8N_WEBHOOK_BASE    = '${N8N_BASE}';"
            echo "window.OPENAI_KEY          = '${OAI_KEY}';"
            echo "window.ADMIN_USER          = '${ADM_USER}';"
            echo "window.ADMIN_PASS          = '${ADM_PASS}';"
          } > public/config.js
          echo "config.js generado:"
          cat public/config.js

      # ── Inyectar secrets en PHP (solo archivos que existen) ──────────
      - name: Inyectar secrets en PHP
        env:
          SB_URL:     ${{ secrets.SUPABASE_URL }}
          SB_KEY:     ${{ secrets.SUPABASE_KEY_SERVICE }}
          OAI_KEY:    ${{ secrets.OPENAI_KEY }}
          AZ_TENANT:  ${{ secrets.AZURE_TENANT_ID }}
          AZ_CLIENT:  ${{ secrets.AZURE_CLIENT_ID }}
          AZ_SECRET:  ${{ secrets.AZURE_CLIENT_SECRET }}
          GRAPH_USER: ${{ secrets.GRAPH_USER_ID }}
        run: |
          PHP_FILES=(
            public/radicar-pqr.php
            public/transcribir-audio.php
            public/procesar-canvas.php
            public/nova-td-respuesta.php
            public/chatbot.php
          )
          for f in "${PHP_FILES[@]}"; do
            [ -f "$f" ] || { echo "omitiendo $f (no existe)"; continue; }
            sed -i "s|__SB_URL__|${SB_URL}|g"          "$f"
            sed -i "s|__SB_KEY__|${SB_KEY}|g"          "$f"
            sed -i "s|__OPENAI_KEY__|${OAI_KEY}|g"     "$f"
            sed -i "s|__AZURE_TENANT_ID__|${AZ_TENANT}|g"  "$f"
            sed -i "s|__AZURE_CLIENT_ID__|${AZ_CLIENT}|g"  "$f"
            sed -i "s|__AZURE_CLIENT_SECRET__|${AZ_SECRET}|g" "$f"
            sed -i "s|__GRAPH_USER_ID__|${GRAPH_USER}|g"    "$f"
            echo "OK $f"
          done

      # ── api-token.php — generado sin heredoc ─────────────────────────
      - name: Generar api-token.php
        env:
          AZ_TENANT: ${{ secrets.AZURE_TENANT_ID }}
          AZ_CLIENT: ${{ secrets.AZURE_CLIENT_ID }}
          AZ_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        run: |
          cat > public/api-token.php << 'PHPEOF'
<?php
header('Content-Type: application/json');
header('Access-Control-Allow-Origin: *');
header('Access-Control-Allow-Methods: POST, OPTIONS');
header('Access-Control-Allow-Headers: Content-Type');
if ($_SERVER['REQUEST_METHOD'] === 'OPTIONS') { http_response_code(200); exit; }
$tenant_id     = 'AZ_TENANT_VAL';
$client_id     = 'AZ_CLIENT_VAL';
$client_secret = 'AZ_SECRET_VAL';
$url  = "https://login.microsoftonline.com/{$tenant_id}/oauth2/v2.0/token";
$body = http_build_query(['grant_type'=>'client_credentials','client_id'=>$client_id,
  'client_secret'=>$client_secret,'scope'=>'https://graph.microsoft.com/.default']);
$ch = curl_init($url);
curl_setopt_array($ch,[CURLOPT_POST=>true,CURLOPT_POSTFIELDS=>$body,
  CURLOPT_RETURNTRANSFER=>true,CURLOPT_TIMEOUT=>15,
  CURLOPT_HTTPHEADER=>['Content-Type: application/x-www-form-urlencoded']]);
$resp = curl_exec($ch);
$code = curl_getinfo($ch,CURLINFO_HTTP_CODE);
curl_close($ch);
http_response_code($code);
echo $resp;
PHPEOF
          sed -i "s|AZ_TENANT_VAL|${AZ_TENANT}|g" public/api-token.php
          sed -i "s|AZ_CLIENT_VAL|${AZ_CLIENT}|g" public/api-token.php
          sed -i "s|AZ_SECRET_VAL|${AZ_SECRET}|g" public/api-token.php
          echo "OK api-token.php"

      # ── adj-proxy.php — generado sin heredoc ─────────────────────────
      - name: Generar adj-proxy.php
        env:
          AZ_TENANT: ${{ secrets.AZURE_TENANT_ID }}
          AZ_CLIENT: ${{ secrets.AZURE_CLIENT_ID }}
          AZ_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        run: |
          cat > public/adj-proxy.php << 'PHPEOF'
<?php
header('Access-Control-Allow-Origin: *');
header('Access-Control-Allow-Methods: GET, OPTIONS');
header('Access-Control-Allow-Headers: Content-Type, Authorization');
if ($_SERVER['REQUEST_METHOD'] === 'OPTIONS') { http_response_code(200); exit; }
$url = $_GET['url'] ?? '';
if (!$url || !str_starts_with($url, 'https://graph.microsoft.com/')) {
  http_response_code(400); echo json_encode(['error'=>'URL invalida']); exit;
}
$tenant_id     = 'AZ_TENANT_VAL';
$client_id     = 'AZ_CLIENT_VAL';
$client_secret = 'AZ_SECRET_VAL';
$tok_ch = curl_init("https://login.microsoftonline.com/{$tenant_id}/oauth2/v2.0/token");
curl_setopt_array($tok_ch,[CURLOPT_POST=>true,CURLOPT_RETURNTRANSFER=>true,CURLOPT_TIMEOUT=>15,
  CURLOPT_POSTFIELDS=>http_build_query(['grant_type'=>'client_credentials',
    'client_id'=>$client_id,'client_secret'=>$client_secret,
    'scope'=>'https://graph.microsoft.com/.default']),
  CURLOPT_HTTPHEADER=>['Content-Type: application/x-www-form-urlencoded']]);
$tok = json_decode(curl_exec($tok_ch),true)['access_token']??'';
curl_close($tok_ch);
if (!$tok) { http_response_code(502); echo json_encode(['error'=>'No token']); exit; }
$ch = curl_init($url);
curl_setopt_array($ch,[CURLOPT_HTTPHEADER=>["Authorization: Bearer $tok"],
  CURLOPT_RETURNTRANSFER=>false,CURLOPT_FOLLOWLOCATION=>true,CURLOPT_TIMEOUT=>120,
  CURLOPT_HEADERFUNCTION=>function($c,$h){
    $t=trim($h);
    if(preg_match('/^(Content-Type|Content-Disposition|Content-Length):/i',$t))header($t);
    return strlen($h);
  }]);
curl_exec($ch); curl_close($ch);
PHPEOF
          sed -i "s|AZ_TENANT_VAL|${AZ_TENANT}|g" public/adj-proxy.php
          sed -i "s|AZ_CLIENT_VAL|${AZ_CLIENT}|g" public/adj-proxy.php
          sed -i "s|AZ_SECRET_VAL|${AZ_SECRET}|g" public/adj-proxy.php
          echo "OK adj-proxy.php"

      # ── Validar secrets ───────────────────────────────────────────────
      - name: Validar secrets
        run: |
          ERRORS=0
          # config.js sin valores vacios
          if grep -q "= '';" public/config.js; then
            echo "FALLA: secrets vacios en config.js:"
            grep "= '';" public/config.js
            ERRORS=$((ERRORS+1))
          fi
          # PHP sin placeholders residuales
          PATTERN='__SB_URL__\|__SB_KEY__\|__OPENAI_KEY__\|__AZURE_TENANT_ID__\|__AZURE_CLIENT_ID__\|__AZURE_CLIENT_SECRET__\|__GRAPH_USER_ID__'
          for f in public/radicar-pqr.php public/transcribir-audio.php public/procesar-canvas.php; do
            [ -f "$f" ] || continue
            if grep -q "$PATTERN" "$f"; then
              echo "FALLA: placeholder residual en $f"
              grep "$PATTERN" "$f"
              ERRORS=$((ERRORS+1))
            else
              echo "OK $f"
            fi
          done
          [ $ERRORS -gt 0 ] && exit 1
          echo "Secrets OK"

      # ── Preparar VPS ──────────────────────────────────────────────────
      - name: Preparar VPS
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.VPS_WEB_HOST }}
          username: root
          key:      ${{ secrets.VPS_SSH_KEY }}
          script: |
            mkdir -p /var/www/pqr
            if ! systemctl is-active --quiet php8.3-fpm 2>/dev/null; then
              apt-get update -qq
              apt-get install -y -qq php8.3-fpm php8.3-curl php8.3-mbstring
              systemctl enable php8.3-fpm && systemctl start php8.3-fpm
            else
              php -m | grep -q mbstring || apt-get install -y -qq php8.3-mbstring
            fi
            if ! grep -q "fastcgi_pass" /etc/nginx/sites-enabled/pqr 2>/dev/null; then
              sed -i 's|location / {|location ~ \\.php$ {\n        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;\n        fastcgi_index index.php;\n        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;\n        include fastcgi_params;\n    }\n    location / {|' /etc/nginx/sites-enabled/pqr 2>/dev/null || true
              nginx -t && systemctl reload nginx
            fi
            echo "VPS listo"

      # ── Copiar archivos ───────────────────────────────────────────────
      - name: Copiar archivos
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.VPS_WEB_HOST }}
          username: root
          key:      ${{ secrets.VPS_SSH_KEY }}
          source:   "public/"
          target:   /var/www/pqr/
          strip_components: 1

      # ── Verificar deploy (solo sintaxis, sin POST a prod) ─────────────
      - name: Verificar deploy
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.VPS_WEB_HOST }}
          username: root
          key:      ${{ secrets.VPS_SSH_KEY }}
          script: |
            nginx -t && systemctl reload nginx && echo "Nginx OK"
            echo "--- PHP files ---"
            ls -la /var/www/pqr/*.php 2>/dev/null || echo "(sin .php)"
            echo "--- Sintaxis PHP ---"
            ERRORS=0
            for f in /var/www/pqr/radicar-pqr.php \
                     /var/www/pqr/transcribir-audio.php \
                     /var/www/pqr/procesar-canvas.php \
                     /var/www/pqr/api-token.php \
                     /var/www/pqr/adj-proxy.php; do
              [ -f "$f" ] || continue
              OUT=$(php -l "$f" 2>&1)
              if echo "$OUT" | grep -q "No syntax errors"; then
                echo "OK $(basename $f)"
              else
                echo "FALLA $(basename $f): $OUT"
                ERRORS=$((ERRORS+1))
              fi
            done
            echo "--- Placeholders residuales ---"
            FOUND=$(grep -rl '__SB_URL__\|__SB_KEY__\|__OPENAI_KEY__\|__AZURE_\|__GRAPH_USER_ID__' \
              /var/www/pqr/*.php 2>/dev/null || true)
            if [ -n "$FOUND" ]; then
              echo "FALLA placeholders en: $FOUND"
              ERRORS=$((ERRORS+1))
            else
              echo "OK sin placeholders residuales"
            fi
            [ $ERRORS -gt 0 ] && exit 1
            echo "Deploy OK - $(date '+%d/%m/%Y %H:%M') Colombia"
