name: Deploy PQR · Tododrogas

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # ── 1. CHECKOUT ────────────────────────────────────────────────
      - name: Checkout código
        uses: actions/checkout@v4

      # ── 2. CONFIG.JS — variables del browser (anon key) ────────────
      - name: Generar config.js
        run: |
          cat > public/config.js << 'ENDOFCONFIG'
          window.SUPABASE_URL = '${{ secrets.SUPABASE_URL }}';
          window.SUPABASE_KEY = '${{ secrets.SUPABASE_KEY }}';
          window.N8N_WEBHOOK_BASE = '${{ secrets.N8N_WEBHOOK_BASE }}';
          ENDOFCONFIG
          # Eliminar indentación
          sed -i 's/^          //' public/config.js
          echo "✅ config.js generado"
          cat public/config.js

      # ── 3. INYECTAR SECRETS EN PHP ────────────────────────────────
      - name: Inyectar secrets en PHP
        run: |
          for f in public/radicar-pqr.php public/transcribir-audio.php public/procesar-canvas.php; do
            [ -f "$f" ] || continue
            sed -i "s|__SB_URL__|${{ secrets.SUPABASE_URL }}|g" "$f"
            sed -i "s|__SB_KEY__|${{ secrets.SUPABASE_KEY_SERVICE }}|g" "$f"
            sed -i "s|__OPENAI_KEY__|${{ secrets.OPENAI_KEY }}|g" "$f"
            echo "✅ $f inyectado"
          done

      # ── 4. GENERAR api-token.php ───────────────────────────────────
      - name: Generar api-token.php
        run: |
          cat > public/api-token.php << 'ENDOFTOKEN'
          <?php
          header('Content-Type: application/json');
          header('Access-Control-Allow-Origin: *');
          header('Access-Control-Allow-Methods: POST, GET, OPTIONS');
          header('Access-Control-Allow-Headers: Content-Type');
          if ($_SERVER['REQUEST_METHOD'] === 'OPTIONS') { http_response_code(200); exit; }

          $TENANT_ID     = 'AZURE_TENANT_ID_VAL';
          $CLIENT_ID     = 'AZURE_CLIENT_ID_VAL';
          $CLIENT_SECRET = 'AZURE_CLIENT_SECRET_VAL';

          $ch = curl_init("https://login.microsoftonline.com/{$TENANT_ID}/oauth2/v2.0/token");
          curl_setopt_array($ch, [
            CURLOPT_POST           => true,
            CURLOPT_POSTFIELDS     => http_build_query([
              'grant_type'    => 'client_credentials',
              'client_id'     => $CLIENT_ID,
              'client_secret' => $CLIENT_SECRET,
              'scope'         => 'https://graph.microsoft.com/.default',
            ]),
            CURLOPT_RETURNTRANSFER => true,
            CURLOPT_TIMEOUT        => 15,
            CURLOPT_HTTPHEADER     => ['Content-Type: application/x-www-form-urlencoded'],
          ]);
          $resp = curl_exec($ch);
          $code = curl_getinfo($ch, CURLINFO_HTTP_CODE);
          curl_close($ch);
          http_response_code($code);
          echo $resp;
          ENDOFTOKEN
          sed -i "s|AZURE_TENANT_ID_VAL|${{ secrets.AZURE_TENANT_ID }}|g" public/api-token.php
          sed -i "s|AZURE_CLIENT_ID_VAL|${{ secrets.AZURE_CLIENT_ID }}|g" public/api-token.php
          sed -i "s|AZURE_CLIENT_SECRET_VAL|${{ secrets.AZURE_CLIENT_SECRET }}|g" public/api-token.php
          echo "✅ api-token.php generado"

      # ── 5. GENERAR adj-proxy.php ───────────────────────────────────
      - name: Generar adj-proxy.php
        run: |
          cat > public/adj-proxy.php << 'ENDOFPROXY'
          <?php
          header('Access-Control-Allow-Origin: *');
          header('Access-Control-Allow-Methods: GET, OPTIONS');
          header('Access-Control-Allow-Headers: Content-Type, Authorization');
          if ($_SERVER['REQUEST_METHOD'] === 'OPTIONS') { http_response_code(200); exit; }

          $TENANT_ID     = 'AZURE_TENANT_ID_VAL';
          $CLIENT_ID     = 'AZURE_CLIENT_ID_VAL';
          $CLIENT_SECRET = 'AZURE_CLIENT_SECRET_VAL';
          $GRAPH_USER    = 'GRAPH_USER_ID_VAL';

          // Obtener token
          $ch = curl_init("https://login.microsoftonline.com/{$TENANT_ID}/oauth2/v2.0/token");
          curl_setopt_array($ch,[CURLOPT_POST=>true,CURLOPT_RETURNTRANSFER=>true,CURLOPT_TIMEOUT=>15,
            CURLOPT_POSTFIELDS=>http_build_query(['grant_type'=>'client_credentials',
              'client_id'=>$CLIENT_ID,'client_secret'=>$CLIENT_SECRET,
              'scope'=>'https://graph.microsoft.com/.default']),
            CURLOPT_HTTPHEADER=>['Content-Type: application/x-www-form-urlencoded']]);
          $tok = json_decode(curl_exec($ch),true)['access_token']??'';
          curl_close($ch);
          if(!$tok){http_response_code(502);echo json_encode(['error'=>'token_fail']);exit;}

          $msgId = $_GET['messageId'] ?? '';
          $attId = $_GET['attachmentId'] ?? '';
          if(!$msgId||!$attId){http_response_code(400);echo json_encode(['error'=>'params']);exit;}

          $url = "https://graph.microsoft.com/v1.0/users/{$GRAPH_USER}/messages/".urlencode($msgId)."/attachments/".urlencode($attId);
          $ch = curl_init($url);
          curl_setopt_array($ch,[CURLOPT_RETURNTRANSFER=>true,CURLOPT_TIMEOUT=>30,
            CURLOPT_HTTPHEADER=>["Authorization: Bearer $tok"]]);
          $resp = curl_exec($ch);
          $code = curl_getinfo($ch,CURLINFO_HTTP_CODE);
          curl_close($ch);

          $att = json_decode($resp,true);
          if($code!==200||empty($att['contentBytes'])){http_response_code($code);echo $resp;exit;}

          $mime = $att['contentType']??'application/octet-stream';
          $name = $att['name']??'adjunto';
          header("Content-Type: $mime");
          header('Content-Disposition: inline; filename="'.addslashes($name).'"');
          echo base64_decode($att['contentBytes']);
          ENDOFPROXY
          sed -i "s|AZURE_TENANT_ID_VAL|${{ secrets.AZURE_TENANT_ID }}|g" public/adj-proxy.php
          sed -i "s|AZURE_CLIENT_ID_VAL|${{ secrets.AZURE_CLIENT_ID }}|g" public/adj-proxy.php
          sed -i "s|AZURE_CLIENT_SECRET_VAL|${{ secrets.AZURE_CLIENT_SECRET }}|g" public/adj-proxy.php
          sed -i "s|GRAPH_USER_ID_VAL|${{ secrets.GRAPH_USER_ID }}|g" public/adj-proxy.php
          echo "✅ adj-proxy.php generado"

      # ── 6. INYECTAR AZURE en radicar-pqr.php ──────────────────────
      - name: Inyectar Azure en PHP
        run: |
          for f in public/radicar-pqr.php; do
            [ -f "$f" ] || continue
            sed -i "s|__AZURE_TENANT_ID__|${{ secrets.AZURE_TENANT_ID }}|g"     "$f"
            sed -i "s|__AZURE_CLIENT_ID__|${{ secrets.AZURE_CLIENT_ID }}|g"     "$f"
            sed -i "s|__AZURE_CLIENT_SECRET__|${{ secrets.AZURE_CLIENT_SECRET }}|g" "$f"
            sed -i "s|__GRAPH_USER_ID__|${{ secrets.GRAPH_USER_ID }}|g"         "$f"
            echo "✅ Azure inyectado en $f"
          done

      # ── 7. VALIDAR SECRETS ────────────────────────────────────────
      - name: Validar secrets
        run: |
          ERRORS=0
          check_secret() {
            local name="$1"
            local val="$2"
            if [ -z "$val" ]; then
              echo "❌ Secret '$name' está vacío"
              ERRORS=$((ERRORS+1))
            else
              echo "✅ $name: configurado (${#val} chars)"
            fi
          }
          check_secret "SUPABASE_URL"        "${{ secrets.SUPABASE_URL }}"
          check_secret "SUPABASE_KEY"        "${{ secrets.SUPABASE_KEY }}"
          check_secret "SUPABASE_KEY_SERVICE" "${{ secrets.SUPABASE_KEY_SERVICE }}"
          check_secret "OPENAI_KEY"          "${{ secrets.OPENAI_KEY }}"
          check_secret "AZURE_TENANT_ID"     "${{ secrets.AZURE_TENANT_ID }}"
          check_secret "AZURE_CLIENT_ID"     "${{ secrets.AZURE_CLIENT_ID }}"
          check_secret "AZURE_CLIENT_SECRET" "${{ secrets.AZURE_CLIENT_SECRET }}"
          check_secret "GRAPH_USER_ID"       "${{ secrets.GRAPH_USER_ID }}"
          check_secret "VPS_WEB_HOST"        "${{ secrets.VPS_WEB_HOST }}"
          check_secret "VPS_SSH_KEY"         "${{ secrets.VPS_SSH_KEY }}"
          if [ $ERRORS -gt 0 ]; then
            echo "❌ $ERRORS secret(s) faltante(s). Revisa GitHub → Settings → Secrets."
            exit 1
          fi
          echo "✅ Todos los secrets presentes"

      # ── 8. PREPARAR VPS ───────────────────────────────────────────
      - name: Preparar VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_WEB_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            mkdir -p /var/www/pqr
            # PHP mbstring requerido para mb_substr
            if ! php -m 2>/dev/null | grep -q mbstring; then
              PHP_VER=$(php -r 'echo PHP_MAJOR_VERSION.".".PHP_MINOR_VERSION;' 2>/dev/null || echo "8.3")
              apt-get install -y "php${PHP_VER}-mbstring" 2>/dev/null || true
            fi

      # ── 9. COPIAR ARCHIVOS ────────────────────────────────────────
      - name: Copiar archivos
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_WEB_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "public/*"
          target: "/var/www/pqr"
          strip_components: 1

      # ── 10. VERIFICAR DEPLOY ──────────────────────────────────────
      - name: Verificar deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_WEB_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "========================================"
            echo "Nginx config check:"
            nginx -t 2>&1 || true

            echo "========================================"
            echo "PHP files en /var/www/pqr:"
            ls -la /var/www/pqr/*.php 2>/dev/null || echo "(ninguno)"

            echo "========================================"
            echo "Validando sintaxis PHP:"
            ERRORS=0
            for f in /var/www/pqr/radicar-pqr.php \
                     /var/www/pqr/transcribir-audio.php \
                     /var/www/pqr/procesar-canvas.php \
                     /var/www/pqr/api-token.php \
                     /var/www/pqr/adj-proxy.php; do
              if [ -f "$f" ]; then
                RESULT=$(php -l "$f" 2>&1)
                if echo "$RESULT" | grep -q "No syntax errors"; then
                  echo "✅ $(basename $f)"
                else
                  echo "❌ $(basename $f): $RESULT"
                  ERRORS=$((ERRORS+1))
                fi
              else
                echo "⚠️  $(basename $f) no existe"
              fi
            done

            # Verificar placeholders no reemplazados
            echo "========================================"
            echo "Verificando placeholders:"
            REMAINING=$(grep -r '__SB_URL__\|__SB_KEY__\|__OPENAI_KEY__\|__AZURE_' /var/www/pqr/*.php 2>/dev/null | wc -l)
            if [ "$REMAINING" -gt 0 ]; then
              echo "❌ Hay $REMAINING placeholder(s) sin reemplazar:"
              grep -r '__SB_URL__\|__SB_KEY__\|__OPENAI_KEY__\|__AZURE_' /var/www/pqr/*.php 2>/dev/null
              ERRORS=$((ERRORS+1))
            else
              echo "✅ Todos los placeholders reemplazados"
            fi

            echo "========================================"
            if [ $ERRORS -gt 0 ]; then
              echo "❌ Deploy con $ERRORS error(es)"
              exit 1
            fi
            echo "✅ Deploy verificado correctamente — $(date '+%Y/%m/%d %H:%M:%S')"
