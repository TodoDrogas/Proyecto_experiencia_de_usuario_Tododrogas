name: 🚀 Deploy PQR Producción — Tododrogas

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:

      # ── 1. CHECKOUT ────────────────────────────────────────────
      - name: Checkout código
        uses: actions/checkout@v4

      # ── 2. CONFIG.JS ────────────────────────────────────────────
      - name: Generar config.js
        run: |
          cat > public/config.js << 'CONFIGEOF'
          window.SUPABASE_URL        = '${{ secrets.SUPABASE_URL }}';
          window.SUPABASE_KEY        = '${{ secrets.SUPABASE_KEY }}';
          window.AZURE_TENANT_ID     = '${{ secrets.AZURE_TENANT_ID }}';
          window.AZURE_CLIENT_ID     = '${{ secrets.AZURE_CLIENT_ID }}';
          window.AZURE_CLIENT_SECRET = '${{ secrets.AZURE_CLIENT_SECRET }}';
          window.GRAPH_USER_ID       = '${{ secrets.GRAPH_USER_ID }}';
          window.N8N_WEBHOOK_BASE    = '${{ secrets.N8N_WEBHOOK_BASE }}';
          window.OPENAI_KEY          = '${{ secrets.OPENAI_KEY }}';
          window.NOVA_PROXY          = '/nova-proxy.php';
          window.VALIDAR_URL         = '/validar-paciente.php';
          window.NOVA_URL            = '/nova-consulta.php';
          window.PQR_FORM_URL        = '/pqr_form.html';
          window.ENC_URL             = '/pqr_encuesta.html';
          window.NOVA_HTML_URL       = '/nova.html';
          window.ADMIN_USER          = '${{ secrets.ADMIN_USER }}';
          window.ADMIN_PASS          = '${{ secrets.ADMIN_PASS }}';
          CONFIGEOF
          echo "✅ config.js generado"

      # ── 3. INYECTAR SECRETS EN PHP ──────────────────────────────
      - name: Inyectar secrets en PHP
        run: |
          PHP_FILES=(
            public/radicar-pqr.php
            public/radicar-encuesta.php
            public/transcribir-audio.php
            public/procesar-canvas.php
            public/nova-td-respuesta.php
            public/chatbot.php
            public/nova-consulta.php
            public/nova-proxy.php
            public/sincronizar-correos.php
            public/cargar-plantillas.php
            public/validar-paciente.php
            public/admin-buscar-paciente.php
            public/admin-buscar-medicamento.php
          )
          for f in "${PHP_FILES[@]}"; do
            [ -f "$f" ] || { echo "⚠️  $f no existe — omitiendo"; continue; }
            sed -i "s|__SB_URL__|${{ secrets.SUPABASE_URL }}|g"                     "$f"
            sed -i "s|__SB_KEY__|${{ secrets.SUPABASE_KEY_SERVICE }}|g"             "$f"
            sed -i "s|__OPENAI_KEY__|${{ secrets.OPENAI_KEY }}|g"                   "$f"
            sed -i "s|__AZURE_TENANT_ID__|${{ secrets.AZURE_TENANT_ID }}|g"         "$f"
            sed -i "s|__AZURE_CLIENT_ID__|${{ secrets.AZURE_CLIENT_ID }}|g"         "$f"
            sed -i "s|__AZURE_CLIENT_SECRET__|${{ secrets.AZURE_CLIENT_SECRET }}|g" "$f"
            sed -i "s|__GRAPH_USER_ID__|${{ secrets.GRAPH_USER_ID }}|g"             "$f"
            sed -i "s|__ADMIN_TOKEN__|${{ secrets.ADMIN_TOKEN }}|g"               "$f"
            sed -i "s|__INBOX_FOLDER_ID__|${{ secrets.INBOX_FOLDER_ID }}|g"         "$f"
            echo "✅ $f inyectado"
          done

      # ── 4. GENERAR api-token.php ────────────────────────────────
      - name: Generar api-token.php
        run: |
          cat > public/api-token.php << 'PHPEOF'
          <?php
          header('Content-Type: application/json');
          header('Access-Control-Allow-Origin: *');
          header('Access-Control-Allow-Methods: POST, OPTIONS');
          header('Access-Control-Allow-Headers: Content-Type');
          if ($_SERVER['REQUEST_METHOD'] === 'OPTIONS') { http_response_code(200); exit; }
          $tenant_id     = 'AZURE_TENANT_ID_VAL';
          $client_id     = 'AZURE_CLIENT_ID_VAL';
          $client_secret = 'AZURE_CLIENT_SECRET_VAL';
          $url  = "https://login.microsoftonline.com/{$tenant_id}/oauth2/v2.0/token";
          $body = http_build_query(['grant_type'=>'client_credentials','client_id'=>$client_id,
            'client_secret'=>$client_secret,'scope'=>'https://graph.microsoft.com/.default']);
          $ch = curl_init($url);
          curl_setopt_array($ch, [CURLOPT_POST=>true,CURLOPT_POSTFIELDS=>$body,
            CURLOPT_RETURNTRANSFER=>true,CURLOPT_TIMEOUT=>15,
            CURLOPT_HTTPHEADER=>['Content-Type: application/x-www-form-urlencoded']]);
          $response = curl_exec($ch);
          $httpCode = curl_getinfo($ch, CURLINFO_HTTP_CODE);
          curl_close($ch);
          http_response_code($httpCode);
          echo $response;
          PHPEOF
          sed -i "s|AZURE_TENANT_ID_VAL|${{ secrets.AZURE_TENANT_ID }}|g"         public/api-token.php
          sed -i "s|AZURE_CLIENT_ID_VAL|${{ secrets.AZURE_CLIENT_ID }}|g"         public/api-token.php
          sed -i "s|AZURE_CLIENT_SECRET_VAL|${{ secrets.AZURE_CLIENT_SECRET }}|g" public/api-token.php
          echo "✅ api-token.php generado"

      # ── 5. GENERAR adj-proxy.php ────────────────────────────────
      - name: Generar adj-proxy.php
        run: |
          cat > public/adj-proxy.php << 'PHPEOF'
          <?php
          header('Access-Control-Allow-Origin: *');
          header('Access-Control-Allow-Methods: GET, OPTIONS');
          header('Access-Control-Allow-Headers: Content-Type, Authorization');
          if ($_SERVER['REQUEST_METHOD'] === 'OPTIONS') { http_response_code(200); exit; }
          $url = $_GET['url'] ?? '';
          if (!$url || !str_starts_with($url, 'https://graph.microsoft.com/')) {
            http_response_code(400); echo json_encode(['error'=>'URL invalida']); exit;
          }
          $tenant_id     = 'AZURE_TENANT_ID_VAL';
          $client_id     = 'AZURE_CLIENT_ID_VAL';
          $client_secret = 'AZURE_CLIENT_SECRET_VAL';
          $token_url  = "https://login.microsoftonline.com/{$tenant_id}/oauth2/v2.0/token";
          $token_body = http_build_query(['grant_type'=>'client_credentials','client_id'=>$client_id,
            'client_secret'=>$client_secret,'scope'=>'https://graph.microsoft.com/.default']);
          $tok_ch = curl_init($token_url);
          curl_setopt_array($tok_ch,[CURLOPT_POST=>true,CURLOPT_POSTFIELDS=>$token_body,
            CURLOPT_RETURNTRANSFER=>true,CURLOPT_TIMEOUT=>15,
            CURLOPT_HTTPHEADER=>['Content-Type: application/x-www-form-urlencoded']]);
          $tok_resp = curl_exec($tok_ch); curl_close($tok_ch);
          $tok_data = json_decode($tok_resp);
          if (empty($tok_data->access_token)) {
            http_response_code(502); echo json_encode(['error'=>'No token']); exit;
          }
          $file_ch = curl_init($url);
          curl_setopt_array($file_ch,[
            CURLOPT_HTTPHEADER=>["Authorization: Bearer {$tok_data->access_token}"],
            CURLOPT_RETURNTRANSFER=>false,CURLOPT_FOLLOWLOCATION=>true,CURLOPT_TIMEOUT=>120,
            CURLOPT_HEADERFUNCTION=>function($ch,$header){
              $h=trim($header);
              if(preg_match('/^(Content-Type|Content-Disposition|Content-Length):/i',$h)) header($h);
              return strlen($header);
            }
          ]);
          curl_exec($file_ch);
          curl_close($file_ch);
          PHPEOF
          sed -i "s|AZURE_TENANT_ID_VAL|${{ secrets.AZURE_TENANT_ID }}|g"         public/adj-proxy.php
          sed -i "s|AZURE_CLIENT_ID_VAL|${{ secrets.AZURE_CLIENT_ID }}|g"         public/adj-proxy.php
          sed -i "s|AZURE_CLIENT_SECRET_VAL|${{ secrets.AZURE_CLIENT_SECRET }}|g" public/adj-proxy.php
          echo "✅ adj-proxy.php generado"

      # ── 6. VALIDAR SECRETS ──────────────────────────────────────
      - name: Validar secrets
        run: |
          ERRORS=0

          # config.js — ningún valor vacío
          EMPTY=$(grep -P "= '';" public/config.js || true)
          if [ -n "$EMPTY" ]; then
            echo "❌ Secrets vacíos en config.js:"
            echo "$EMPTY"
            ERRORS=$((ERRORS+1))
          fi

          # PHP — verificar placeholders residuales en TODOS los archivos incluido nova-proxy.php
          PLACEHOLDERS='__SB_URL__\|__SB_KEY__\|__OPENAI_KEY__\|__AZURE_TENANT_ID__\|__AZURE_CLIENT_ID__\|__AZURE_CLIENT_SECRET__\|__GRAPH_USER_ID__\|__ADMIN_TOKEN__\|__INBOX_FOLDER_ID__'
          for f in public/radicar-pqr.php public/radicar-encuesta.php public/transcribir-audio.php public/procesar-canvas.php public/sincronizar-correos.php public/nova-td-respuesta.php public/nova-proxy.php public/nova-consulta.php public/cargar-plantillas.php public/validar-paciente.php public/admin-buscar-paciente.php public/admin-buscar-medicamento.php; do
            [ -f "$f" ] || continue
            if grep -q "$PLACEHOLDERS" "$f"; then
              echo "❌ Placeholders sin reemplazar en $f"
              grep "$PLACEHOLDERS" "$f"
              ERRORS=$((ERRORS+1))
            else
              echo "✅ $f limpio"
            fi
          done

          if [ $ERRORS -gt 0 ]; then
            echo "❌ $ERRORS error(es). Revisa GitHub → Settings → Secrets."
            exit 1
          fi
          echo "✅ Todos los secrets validados"

      # ── 7. PREPARAR VPS ────────────────────────────────────────
      - name: Preparar VPS
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.VPS_WEB_HOST }}
          username: root
          key:      ${{ secrets.VPS_SSH_KEY }}
          script: |
            mkdir -p /var/www/pqr
            if ! systemctl is-active --quiet php8.3-fpm 2>/dev/null; then
              apt-get update -qq && apt-get install -y -qq php8.3-fpm php8.3-curl php8.3-mbstring
              systemctl enable php8.3-fpm && systemctl start php8.3-fpm
            fi
            if ! grep -q "fastcgi_pass" /etc/nginx/sites-enabled/pqr 2>/dev/null; then
              sed -i 's|location / {|location ~ \\.php$ {\n        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;\n        fastcgi_index index.php;\n        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;\n        include fastcgi_params;\n    }\n    location / {|' /etc/nginx/sites-enabled/pqr 2>/dev/null || true
              nginx -t && systemctl reload nginx
            fi
            echo "✅ VPS listo"


      # ── 7B. CONFIGURAR LÍMITES DE SUBIDA (fix Error 413 audio 2min) ──
      - name: Configurar límites upload
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.VPS_WEB_HOST }}
          username: root
          key:      ${{ secrets.VPS_SSH_KEY }}
          script: |
            # PHP: aumentar límites de subida
            PHP_INI=$(php --ini | grep "Loaded Configuration" | awk '{print $NF}')
            if [ -f "$PHP_INI" ]; then
              grep -q "^upload_max_filesize" "$PHP_INI" \
                && sed -i 's/^upload_max_filesize.*/upload_max_filesize = 32M/' "$PHP_INI" \
                || echo "upload_max_filesize = 32M" >> "$PHP_INI"
              grep -q "^post_max_size" "$PHP_INI" \
                && sed -i 's/^post_max_size.*/post_max_size = 32M/' "$PHP_INI" \
                || echo "post_max_size = 32M" >> "$PHP_INI"
              echo "✅ php.ini: upload_max_filesize=32M, post_max_size=32M"
            fi
            # PHP-FPM pool
            POOL_FILE=$(find /etc/php -name "www.conf" 2>/dev/null | head -1)
            if [ -f "$POOL_FILE" ]; then
              grep -q "^php_admin_value\[upload_max_filesize\]" "$POOL_FILE" \
                && sed -i 's/^php_admin_value\[upload_max_filesize\].*/php_admin_value[upload_max_filesize] = 32M/' "$POOL_FILE" \
                || echo "php_admin_value[upload_max_filesize] = 32M" >> "$POOL_FILE"
              grep -q "^php_admin_value\[post_max_size\]" "$POOL_FILE" \
                && sed -i 's/^php_admin_value\[post_max_size\].*/php_admin_value[post_max_size] = 32M/' "$POOL_FILE" \
                || echo "php_admin_value[post_max_size] = 32M" >> "$POOL_FILE"
              echo "✅ PHP-FPM pool: 32M"
            fi
            # Nginx: client_max_body_size
            NGINX_CONF="/etc/nginx/sites-enabled/pqr"
            if [ -f "$NGINX_CONF" ]; then
              grep -q "client_max_body_size" "$NGINX_CONF" \
                && sed -i 's/client_max_body_size.*/client_max_body_size 32M;/' "$NGINX_CONF" \
                || sed -i 's/server {/server {\n    client_max_body_size 32M;/' "$NGINX_CONF"
            else
              grep -q "client_max_body_size" /etc/nginx/nginx.conf \
                && sed -i 's/client_max_body_size.*/client_max_body_size 32M;/' /etc/nginx/nginx.conf \
                || sed -i 's/http {/http {\n    client_max_body_size 32M;/' /etc/nginx/nginx.conf
            fi
            echo "✅ Nginx: client_max_body_size=32M"
            # Reiniciar servicios
            systemctl restart php8.3-fpm
            nginx -t && systemctl reload nginx
            echo "✅ Límites aplicados correctamente"

      # ── 8. COPIAR ARCHIVOS ──────────────────────────────────────
      - name: Copiar archivos
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.VPS_WEB_HOST }}
          username: root
          key:      ${{ secrets.VPS_SSH_KEY }}
          source:   "public/"
          target:   /var/www/pqr/
          strip_components: 1

      # ── 8B. MIGRAR TABLAS SUPABASE (idempotente — safe en cada deploy) ──
      - name: Migrar tablas Supabase
        continue-on-error: true
        run: |
          SB_URL="${{ secrets.SUPABASE_URL }}"
          SB_KEY="${{ secrets.SUPABASE_KEY_SERVICE }}"

          run_sql() {
            local sql="$1"
            local json_body
            json_body=$(printf '{"query":"%s"}' "$(echo "$sql" | sed 's/"/\\"/g')")
            curl -s -o /dev/null -w "%{http_code}" -X POST "${SB_URL}/rest/v1/rpc/exec_sql" \
              -H "apikey: ${SB_KEY}" \
              -H "Authorization: Bearer ${SB_KEY}" \
              -H "Content-Type: application/json" \
              -d "$json_body"
          }

          # 1. Tabla nova_sesiones (crear si no existe)
          CODE=$(run_sql "CREATE TABLE IF NOT EXISTS nova_sesiones (id uuid DEFAULT gen_random_uuid() PRIMARY KEY, sesion_id text, cedula text, nombre text, eps text, turnos int DEFAULT 0, resumen text, motivo_cierre text, created_at timestamptz DEFAULT now());")
          [ "$CODE" = "200" ] && echo "✅ nova_sesiones OK" || echo "⚠️ nova_sesiones: $CODE"

          # 2. nova_sesiones.origen — distingue nova_web vs nova_directo
          CODE=$(run_sql "ALTER TABLE nova_sesiones ADD COLUMN IF NOT EXISTS origen text DEFAULT 'nova_web';")
          [ "$CODE" = "200" ] && echo "✅ nova_sesiones.origen OK" || echo "⚠️ nova_sesiones.origen: $CODE"

          # 3. encuestas_satisfaccion.origen — distingue web / nova_web / nova_directo / qr
          CODE=$(run_sql "ALTER TABLE encuestas_satisfaccion ADD COLUMN IF NOT EXISTS origen text DEFAULT 'web';")
          [ "$CODE" = "200" ] && echo "✅ encuestas_satisfaccion.origen OK" || echo "⚠️ encuestas_satisfaccion.origen: $CODE"

          # 4. encuestas_satisfaccion.nombre — trazabilidad usuario Nova
          CODE=$(run_sql "ALTER TABLE encuestas_satisfaccion ADD COLUMN IF NOT EXISTS nombre text;")
          [ "$CODE" = "200" ] && echo "✅ encuestas_satisfaccion.nombre OK" || echo "⚠️ encuestas_satisfaccion.nombre: $CODE"

          # 5. encuestas_satisfaccion.cedula
          CODE=$(run_sql "ALTER TABLE encuestas_satisfaccion ADD COLUMN IF NOT EXISTS cedula text;")
          [ "$CODE" = "200" ] && echo "✅ encuestas_satisfaccion.cedula OK" || echo "⚠️ encuestas_satisfaccion.cedula: $CODE"

          # 6. encuestas_satisfaccion.eps
          CODE=$(run_sql "ALTER TABLE encuestas_satisfaccion ADD COLUMN IF NOT EXISTS eps text;")
          [ "$CODE" = "200" ] && echo "✅ encuestas_satisfaccion.eps OK" || echo "⚠️ encuestas_satisfaccion.eps: $CODE"

          # 7. correos.origen — asegurar que existe (para radicados vía pqr_form)
          CODE=$(run_sql "ALTER TABLE correos ADD COLUMN IF NOT EXISTS origen text DEFAULT 'web';")
          [ "$CODE" = "200" ] && echo "✅ correos.origen OK" || echo "⚠️ correos.origen: $CODE"

          # 8. correos.resumen_ia — resumen generado por IA
          CODE=$(run_sql "ALTER TABLE correos ADD COLUMN IF NOT EXISTS resumen_ia text;")
          [ "$CODE" = "200" ] && echo "✅ correos.resumen_ia OK" || echo "⚠️ correos.resumen_ia: $CODE"

          # 9. correos.fecha_resolucion — para calcular tiempos de asesor
          CODE=$(run_sql "ALTER TABLE correos ADD COLUMN IF NOT EXISTS fecha_resolucion timestamptz;")
          [ "$CODE" = "200" ] && echo "✅ correos.fecha_resolucion OK" || echo "⚠️ correos.fecha_resolucion: $CODE"

          echo "✅ Migración Supabase completada"

      # ── 9. CONFIGURAR CRON — sincronizar correos cada 5 min ────
      - name: Configurar cron sync
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.VPS_WEB_HOST }}
          username: root
          key:      ${{ secrets.VPS_SSH_KEY }}
          script: |
            CRON_LINE="* * * * * php /var/www/pqr/sincronizar-correos.php >> /var/log/sync-correos.log 2>&1"
            if ! crontab -l 2>/dev/null | grep -q "sincronizar-correos.php"; then
              (crontab -l 2>/dev/null; echo "$CRON_LINE") | crontab -
              echo "✅ Cron configurado: cada 5 min"
            else
              echo "✅ Cron ya existía — sin cambios"
            fi
            touch /var/log/sync-correos.log
            chmod 644 /var/log/sync-correos.log
            echo "✅ Log file listo"

      # ── 10. VERIFICAR DEPLOY ─────────────────────────────────────
      - name: Verificar deploy
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.VPS_WEB_HOST }}
          username: root
          key:      ${{ secrets.VPS_SSH_KEY }}
          script: |
            nginx -t && systemctl reload nginx && echo "✅ Nginx OK"

            echo "--- Archivos PHP desplegados ---"
            ls -la /var/www/pqr/*.php 2>/dev/null || echo "(sin .php)"

            echo "--- Sintaxis PHP ---"
            ERRORS=0
            for f in /var/www/pqr/radicar-pqr.php \
                     /var/www/pqr/radicar-encuesta.php \
                     /var/www/pqr/transcribir-audio.php \
                     /var/www/pqr/procesar-canvas.php \
                     /var/www/pqr/sincronizar-correos.php \
                     /var/www/pqr/nova-td-respuesta.php \
                     /var/www/pqr/nova-proxy.php \
                     /var/www/pqr/nova-consulta.php \
                     /var/www/pqr/cargar-plantillas.php \
                     /var/www/pqr/validar-paciente.php \
                     /var/www/pqr/admin-buscar-paciente.php \
                     /var/www/pqr/admin-buscar-medicamento.php \
                     /var/www/pqr/api-token.php \
                     /var/www/pqr/adj-proxy.php; do
              [ -f "$f" ] || continue
              OUT=$(php -l "$f" 2>&1)
              if echo "$OUT" | grep -q "No syntax errors"; then
                echo "✅ $(basename $f)"
              else
                echo "❌ $(basename $f): $OUT"
                ERRORS=$((ERRORS+1))
              fi
            done

            echo "--- Placeholders residuales ---"
            FOUND=$(grep -rl '__SB_URL__\|__SB_KEY__\|__OPENAI_KEY__\|__AZURE_\|__GRAPH_USER_ID__\|__ADMIN_TOKEN__\|__INBOX_FOLDER_ID__' \
              /var/www/pqr/*.php 2>/dev/null || true)
            if [ -n "$FOUND" ]; then
              echo "❌ Placeholders sin reemplazar en: $FOUND"
              ERRORS=$((ERRORS+1))
            else
              echo "✅ Sin placeholders residuales"
            fi

            # Verificar archivos HTML clave
            for h in /var/www/pqr/pqr_bienvenida.html \
                     /var/www/pqr/nova.html \
                     /var/www/pqr/admin.html; do
              [ -f "$h" ] && echo "✅ $(basename $h)" || echo "⚠️ $(basename $h) no encontrado"
            done

            [ $ERRORS -gt 0 ] && exit 1
            echo "✅ Deploy OK — $(date '+%d/%m/%Y %H:%M') hora Colombia"
