name: 🚀 Deploy PQR Producción — Tododrogas

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:

      # ── 1. CHECKOUT ────────────────────────────────────────────
      - name: Checkout código
        uses: actions/checkout@v4

      # ── 2. CONFIG.JS ────────────────────────────────────────────
      - name: Generar config.js
        run: |
          cat > public/config.js << 'CONFIGEOF'
          window.SUPABASE_URL        = '${{ secrets.SUPABASE_URL }}';
          window.SUPABASE_KEY        = '${{ secrets.SUPABASE_KEY }}';
          window.GRAPH_USER_ID       = '${{ secrets.GRAPH_USER_ID }}';
          window.N8N_WEBHOOK_BASE    = '${{ secrets.N8N_WEBHOOK_BASE }}';
          window.ADMIN_PASS          = '${{ secrets.ADMIN_TOKEN }}';
          window.NOVA_PROXY          = '/nova-proxy.php';
          window.VALIDAR_URL         = '/validar-paciente.php';
          window.NOVA_URL            = '/nova-consulta.php';
          window.PQR_FORM_URL        = '/pqr_form.html';
          window.ENC_URL             = '/pqr_encuesta.html';
          window.NOVA_HTML_URL       = '/nova.html';
          CONFIGEOF
          echo "✅ config.js generado"

      # ── 3. INYECTAR SECRETS EN PHP ──────────────────────────────
      - name: Inyectar secrets en PHP
        run: |
          PHP_FILES=(
            public/radicar-pqr.php
            public/radicar-encuesta.php
            public/transcribir-audio.php
            public/procesar-canvas.php
            public/nova-td-respuesta.php
            public/chatbot.php
            public/nova-consulta.php
            public/nova-proxy.php
            public/sincronizar-correos.php
            public/cargar-plantillas.php
            public/validar-paciente.php
            public/admin-buscar-paciente.php
            public/admin-buscar-medicamento.php
            public/login.php
            public/login_gestor.php
            public/whatsapp-webhook.php
            public/nova-wa.php
          )
          for f in "${PHP_FILES[@]}"; do
            [ -f "$f" ] || { echo "⚠️  $f no existe — omitiendo"; continue; }
            sed -i "s|__SB_URL__|${{ secrets.SUPABASE_URL }}|g"                     "$f"
            sed -i "s|__SB_KEY__|${{ secrets.SUPABASE_KEY_SERVICE }}|g"             "$f"
            sed -i "s|__OPENAI_KEY__|${{ secrets.OPENAI_KEY }}|g"                   "$f"
            sed -i "s|__AZURE_TENANT_ID__|${{ secrets.AZURE_TENANT_ID }}|g"         "$f"
            sed -i "s|__AZURE_CLIENT_ID__|${{ secrets.AZURE_CLIENT_ID }}|g"         "$f"
            sed -i "s|__AZURE_CLIENT_SECRET__|${{ secrets.AZURE_CLIENT_SECRET }}|g" "$f"
            sed -i "s|__GRAPH_USER_ID__|${{ secrets.GRAPH_USER_ID }}|g"             "$f"
            sed -i "s|__ADMIN_TOKEN__|${{ secrets.ADMIN_TOKEN }}|g"                 "$f"
            sed -i "s|__INBOX_FOLDER_ID__|${{ secrets.INBOX_FOLDER_ID }}|g"         "$f"
            sed -i "s|__ADMIN_USER__|${{ secrets.ADMIN_USER }}|g"                   "$f"
            sed -i "s|__ADMIN_PASS__|${{ secrets.ADMIN_PASS }}|g"                   "$f"
            sed -i "s|__USUARIO_GESTOR__|${{ secrets.USUARIO_GESTOR }}|g"           "$f"
            sed -i "s|__PASS_GESTOR__|${{ secrets.PASS_GESTOR }}|g"                 "$f"
            sed -i "s|__TOKEN_WHATSAPP__|${{ secrets.TOKEN_WHATSAPP }}|g"          "$f"
            sed -i "s|__WA_VERIFY_TOKEN__|${{ secrets.WA_VERIFY_TOKEN }}|g"        "$f"
            sed -i "s|__APP_SECRET__|${{ secrets.APP_SECRET }}|g"                  "$f"
            sed -i "s|__ANTHROPIC_KEY__|${{ secrets.ANTHROPIC_KEY }}|g"            "$f"
            sed -i "s|__NOVA_TOKEN__|${{ secrets.NOVA_TOKEN }}|g"                "$f"
            echo "✅ $f inyectado"
          done

      # ── 4. GENERAR api-token.php ────────────────────────────────
      - name: Generar api-token.php
        run: |
          cat > public/api-token.php << 'PHPEOF'
          <?php
          $origin  = $_SERVER['HTTP_ORIGIN'] ?? '';
          $allowed = ['https://tododrogas.online', 'https://www.tododrogas.online'];
          if ($origin && !in_array($origin, $allowed)) { http_response_code(403); echo json_encode(['error'=>'Origen no permitido']); exit; }
          header('Content-Type: application/json; charset=utf-8');
          if ($origin) header('Access-Control-Allow-Origin: ' . $origin);
          header('Access-Control-Allow-Methods: POST, OPTIONS');
          header('Access-Control-Allow-Headers: Content-Type');
          if ($_SERVER['REQUEST_METHOD'] === 'OPTIONS') { http_response_code(200); exit; }
          $tenant_id     = 'AZURE_TENANT_ID_VAL';
          $client_id     = 'AZURE_CLIENT_ID_VAL';
          $client_secret = 'AZURE_CLIENT_SECRET_VAL';
          $url  = "https://login.microsoftonline.com/{$tenant_id}/oauth2/v2.0/token";
          $body = http_build_query(['grant_type'=>'client_credentials','client_id'=>$client_id,
            'client_secret'=>$client_secret,'scope'=>'https://graph.microsoft.com/.default']);
          $ch = curl_init($url);
          curl_setopt_array($ch, [CURLOPT_POST=>true,CURLOPT_POSTFIELDS=>$body,
            CURLOPT_RETURNTRANSFER=>true,CURLOPT_TIMEOUT=>15,
            CURLOPT_HTTPHEADER=>['Content-Type: application/x-www-form-urlencoded']]);
          $response = curl_exec($ch);
          $httpCode = curl_getinfo($ch, CURLINFO_HTTP_CODE);
          curl_close($ch);
          http_response_code($httpCode);
          echo $response;
          PHPEOF
          sed -i "s|AZURE_TENANT_ID_VAL|${{ secrets.AZURE_TENANT_ID }}|g"         public/api-token.php
          sed -i "s|AZURE_CLIENT_ID_VAL|${{ secrets.AZURE_CLIENT_ID }}|g"         public/api-token.php
          sed -i "s|AZURE_CLIENT_SECRET_VAL|${{ secrets.AZURE_CLIENT_SECRET }}|g" public/api-token.php
          echo "✅ api-token.php generado"

      # ── 5. GENERAR adj-proxy.php ────────────────────────────────
      - name: Generar adj-proxy.php
        run: |
          cat > public/adj-proxy.php << 'PHPEOF'
          <?php
          header('Access-Control-Allow-Origin: *');
          header('Access-Control-Allow-Methods: GET, OPTIONS');
          header('Access-Control-Allow-Headers: Content-Type, Authorization');
          if ($_SERVER['REQUEST_METHOD'] === 'OPTIONS') { http_response_code(200); exit; }
          $url = $_GET['url'] ?? '';
          if (!$url || !str_starts_with($url, 'https://graph.microsoft.com/')) {
            http_response_code(400); echo json_encode(['error'=>'URL invalida']); exit;
          }
          $tenant_id     = 'AZURE_TENANT_ID_VAL';
          $client_id     = 'AZURE_CLIENT_ID_VAL';
          $client_secret = 'AZURE_CLIENT_SECRET_VAL';
          $token_url  = "https://login.microsoftonline.com/{$tenant_id}/oauth2/v2.0/token";
          $token_body = http_build_query(['grant_type'=>'client_credentials','client_id'=>$client_id,
            'client_secret'=>$client_secret,'scope'=>'https://graph.microsoft.com/.default']);
          $tok_ch = curl_init($token_url);
          curl_setopt_array($tok_ch,[CURLOPT_POST=>true,CURLOPT_POSTFIELDS=>$token_body,
            CURLOPT_RETURNTRANSFER=>true,CURLOPT_TIMEOUT=>15,
            CURLOPT_HTTPHEADER=>['Content-Type: application/x-www-form-urlencoded']]);
          $tok_resp = curl_exec($tok_ch); curl_close($tok_ch);
          $tok_data = json_decode($tok_resp);
          if (empty($tok_data->access_token)) {
            http_response_code(502); echo json_encode(['error'=>'No token']); exit;
          }
          $file_ch = curl_init($url);
          curl_setopt_array($file_ch,[
            CURLOPT_HTTPHEADER=>["Authorization: Bearer {$tok_data->access_token}"],
            CURLOPT_RETURNTRANSFER=>false,CURLOPT_FOLLOWLOCATION=>true,CURLOPT_TIMEOUT=>120,
            CURLOPT_HEADERFUNCTION=>function($ch,$header){
              $h=trim($header);
              if(preg_match('/^(Content-Type|Content-Disposition|Content-Length):/i',$h)) header($h);
              return strlen($header);
            }
          ]);
          curl_exec($file_ch);
          curl_close($file_ch);
          PHPEOF
          sed -i "s|AZURE_TENANT_ID_VAL|${{ secrets.AZURE_TENANT_ID }}|g"         public/adj-proxy.php
          sed -i "s|AZURE_CLIENT_ID_VAL|${{ secrets.AZURE_CLIENT_ID }}|g"         public/adj-proxy.php
          sed -i "s|AZURE_CLIENT_SECRET_VAL|${{ secrets.AZURE_CLIENT_SECRET }}|g" public/adj-proxy.php
          echo "✅ adj-proxy.php generado"

      # ── 6. VALIDAR SECRETS ──────────────────────────────────────
      - name: Validar secrets
        run: |
          ERRORS=0
          EMPTY=$(grep -P "= '';" public/config.js || true)
          if [ -n "$EMPTY" ]; then
            echo "❌ Secrets vacíos en config.js:"
            echo "$EMPTY"
            ERRORS=$((ERRORS+1))
          fi
          PLACEHOLDERS='__SB_URL__\|__SB_KEY__\|__OPENAI_KEY__\|__AZURE_TENANT_ID__\|__AZURE_CLIENT_ID__\|__AZURE_CLIENT_SECRET__\|__GRAPH_USER_ID__\|__ADMIN_TOKEN__\|__INBOX_FOLDER_ID__\|__ANTHROPIC_KEY__'
          for f in public/radicar-pqr.php public/radicar-encuesta.php public/transcribir-audio.php public/procesar-canvas.php public/sincronizar-correos.php public/nova-td-respuesta.php public/nova-proxy.php public/nova-consulta.php public/cargar-plantillas.php public/validar-paciente.php public/admin-buscar-paciente.php public/admin-buscar-medicamento.php public/whatsapp-webhook.php; do
            [ -f "$f" ] || continue
            if grep -q "$PLACEHOLDERS" "$f"; then
              echo "❌ Placeholders sin reemplazar en $f"
              grep "$PLACEHOLDERS" "$f"
              ERRORS=$((ERRORS+1))
            else
              echo "✅ $f limpio"
            fi
          done
          if [ $ERRORS -gt 0 ]; then
            echo "❌ $ERRORS error(es). Revisa GitHub → Settings → Secrets."
            exit 1
          fi
          echo "✅ Todos los secrets validados"

      # ── 7. COPIAR ARCHIVOS ──────────────────────────────────────
      - name: Copiar archivos
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.VPS_WEB_HOST }}
          username: root
          key:      ${{ secrets.VPS_SSH_KEY }}
          source:   "public/"
          target:   /var/www/pqr/
          strip_components: 1

      # ── 7b. GENERAR webhook-twilio/server.js ────────────────────
      - name: Generar webhook-twilio/server.js
        run: |
          mkdir -p webhook-twilio

          # package.json fijo — versiones pinneadas para deploy predecible
          cat > webhook-twilio/package.json << 'PKGEOF'
          {
            "name": "webhook-twilio-tododrogas",
            "version": "1.0.0",
            "description": "Webhook Twilio para WhatsApp Tododrogas",
            "main": "server.js",
            "scripts": { "start": "node server.js" },
            "dependencies": {
              "express": "4.18.2",
              "twilio": "5.3.0",
              "@supabase/supabase-js": "2.43.0",
              "dotenv": "16.4.5",
              "ws": "8.17.0"
            }
          }
          PKGEOF
          echo "✅ webhook-twilio/package.json generado"

          cat > webhook-twilio/server.js << 'JSEOF'
          const express = require('express');
          const twilio  = require('twilio');
          const { createClient } = require('@supabase/supabase-js');
          const ws = require('ws');
          const crypto = require('crypto');
          require('dotenv').config();

          const app = express();

          // ── CORS — solo tododrogas.online puede llamar a /send ──
          const ALLOWED_ORIGINS = ['https://tododrogas.online','https://www.tododrogas.online'];
          app.use((req, res, next) => {
            const origin = req.headers.origin || '';
            if (ALLOWED_ORIGINS.includes(origin)) {
              res.setHeader('Access-Control-Allow-Origin', origin);
              res.setHeader('Access-Control-Allow-Methods', 'POST, OPTIONS');
              res.setHeader('Access-Control-Allow-Headers', 'Content-Type');
            }
            if (req.method === 'OPTIONS') return res.sendStatus(200);
            next();
          });

          app.use(express.urlencoded({ extended: false }));
          app.use(express.json());

          // ── RATE LIMITING — máx 30 msgs/min por número ──
          const ratemap = new Map();
          function rateLimit(telefono) {
            const now = Date.now();
            const entry = ratemap.get(telefono) || { count: 0, ts: now };
            if (now - entry.ts > 60000) { entry.count = 0; entry.ts = now; }
            entry.count++;
            ratemap.set(telefono, entry);
            return entry.count > 30;
          }

          const twilioClient = twilio(process.env.TWILIO_ACCOUNT_SID, process.env.TWILIO_AUTH_TOKEN);
          const supabase     = createClient(process.env.SUPABASE_URL, process.env.SUPABASE_KEY, {
            realtime: { transport: ws }
          });
          const WA_NUMBER    = 'whatsapp:+14155238886';
          const PORT         = process.env.PORT || 3000;

          // ── VALIDAR FIRMA TWILIO (HMAC-SHA1) ──
          function validarFirmaTwilio(req) {
            const token     = process.env.TWILIO_AUTH_TOKEN;
            const signature = req.headers['x-twilio-signature'] || '';
            const url       = 'https://tododrogas.online/twilio/webhook/twilio';
            const params    = req.body || {};
            const sorted    = Object.keys(params).sort().reduce((s, k) => s + k + params[k], url);
            const expected  = crypto.createHmac('sha1', token).update(sorted).digest('base64');
            return crypto.timingSafeEqual(Buffer.from(signature), Buffer.from(expected));
          }

          app.get('/', (req, res) => res.json({ status: 'ok', service: 'webhook-twilio-tododrogas' }));

          app.post('/webhook/twilio', async (req, res) => {
            res.set('Content-Type', 'text/xml');

            // Validar que viene de Twilio
            try {
              if (!validarFirmaTwilio(req)) {
                console.warn('⚠️ Firma Twilio inválida — petición rechazada');
                return res.status(403).send('<Response></Response>');
              }
            } catch(e) {
              console.warn('⚠️ Error validando firma:', e.message);
              return res.status(403).send('<Response></Response>');
            }

            try {
              const from     = req.body.From || '';
              const body     = req.body.Body || '';
              const profile  = req.body.ProfileName || '';
              const telefono = from.replace('whatsapp:', '');

              // Rate limiting por número
              if (rateLimit(telefono)) {
                console.warn('⚠️ Rate limit excedido para', telefono);
                return res.send('<Response></Response>');
              }

              const { data: sesion } = await supabase
                .from('wa_sesiones').select('*').eq('telefono', telefono).single();

              const nuevoMsg = { role: 'user', content: body, ts: new Date().toISOString() };
              const history = sesion ? (Array.isArray(sesion.history) ? sesion.history : []) : [];
              if (history.length >= 200) history.splice(0, history.length - 199);
              history.push(nuevoMsg);

              // ── Llamar a Nova TD para responder automáticamente ──
              let novaRespuesta = null;
              try {
                // Si es sesión nueva, buscar datos previos del usuario en correos
                let sesionParaNova = sesion;
                if (!sesion) {
                  const telNum = telefono.replace(/\D/g,'');
                  const { data: correoWA } = await supabase
                    .from('correos')
                    .select('cedula_paciente,nombre,eps_id,ciudad_paciente,telefono_contacto')
                    .eq('ticket_id', `WA-${telNum}`)
                    .single();
                  if (correoWA) {
                    // Usuario conocido — pre-llenar datos para que Nova no pida cédula
                    const { data: epsData } = await supabase
                      .from('eps_catalogo').select('nombre').eq('id', correoWA.eps_id).single();
                    sesionParaNova = {
                      telefono,
                      nombre: correoWA.nombre || profile || '',
                      cedula: correoWA.cedula_paciente || '',
                      eps: epsData?.nombre || '',
                      ciudad: correoWA.ciudad_paciente || '',
                      history: [],
                      intentos_nova: 0,
                      origen_canal: 'whatsapp_directo'
                    };
                    console.log(`✅ Usuario conocido: ${correoWA.nombre} - cédula pre-llenada`);
                  } else {
                    sesionParaNova = {
                      telefono, nombre: profile || '',
                      history: [], intentos_nova: 0, origen_canal: 'whatsapp_directo'
                    };
                  }
                }
                const https = require('https');
                const novaAgent = new https.Agent({ rejectUnauthorized: false });
                const novaRes = await fetch('https://tododrogas.online/nova-wa.php', {
                  method: 'POST',
                  agent: novaAgent,
                  headers: {
                    'Content-Type': 'application/json',
                    'X-Nova-Token': process.env.NOVA_TOKEN || ''
                  },
                  body: JSON.stringify({ telefono, mensaje: body, sesion: sesionParaNova })
                });
                if (novaRes.ok) novaRespuesta = await novaRes.json();
              } catch(novaErr) {
                console.error('Error llamando a Nova:', novaErr.message);
              }

              // Si Nova respondió, agregar al historial y enviar por Twilio
              if (novaRespuesta?.respuesta) {
                const novaMsg = {
                  role: 'nova',
                  content: novaRespuesta.respuesta,
                  ts: new Date().toISOString()
                };
                if (history.length >= 200) history.splice(0, history.length - 199);
                history.push(novaMsg);

                // Enviar respuesta de Nova al usuario por WhatsApp
                try {
                  await twilioClient.messages.create({
                    from: WA_NUMBER,
                    to: `whatsapp:${telefono}`,
                    body: novaRespuesta.respuesta
                  });
                } catch(sendErr) {
                  console.error('Error enviando respuesta Nova:', sendErr.message);
                }
              }

              // Preparar actualización de Supabase
              const updateData = {
                history,
                unread_count: (sesion?.unread_count || 0) + 1,
                updated_at: new Date().toISOString(),
                intentos_nova: novaRespuesta?.intentos ?? (sesion?.intentos_nova || 0),
              };

              // Actualizar campos de identidad si Nova los resolvió
              if (novaRespuesta?.cedula) updateData.cedula = novaRespuesta.cedula;
              if (novaRespuesta?.nombre) updateData.nombre = novaRespuesta.nombre;
              if (novaRespuesta?.eps)    updateData.eps    = novaRespuesta.eps;
              if (novaRespuesta?.ciudad) updateData.ciudad = novaRespuesta.ciudad;

              if (sesion) {
                if (profile && !sesion.nombre) updateData.nombre = profile;
                await supabase.from('wa_sesiones').update(updateData).eq('telefono', telefono);
              } else {
                await supabase.from('wa_sesiones').insert({
                  telefono,
                  nombre: novaRespuesta?.nombre || profile || '',
                  eps: novaRespuesta?.eps || '',
                  ciudad: novaRespuesta?.ciudad || '',
                  cedula: novaRespuesta?.cedula || null,
                  historia: history,
                  history,
                  estado: novaRespuesta?.accion === 'ESCALADO' ? 'escalado' : 'nova',
                  origen_canal: 'whatsapp_directo',
                  intentos_nova: novaRespuesta?.intentos ?? 0,
                  resumen_nova: novaRespuesta?.resumen || null,
                  unread_count: 1,
                  updated_at: new Date().toISOString()
                });
              }
              res.send('<Response></Response>');
            } catch (err) {
              console.error('Error webhook:', err.message);
              res.send('<Response></Response>');
            }
          });

          app.post('/send', async (req, res) => {
            // Solo permitir desde tododrogas.online (ya cubierto por CORS)
            const origin = req.headers.origin || req.headers.referer || '';
            if (!ALLOWED_ORIGINS.some(o => origin.startsWith(o))) {
              return res.status(403).json({ error: 'Origen no permitido' });
            }
            try {
              const { telefono, mensaje, agente_nombre } = req.body;
              if (!telefono || !mensaje)
                return res.status(400).json({ error: 'telefono y mensaje son requeridos' });

              const msg = await twilioClient.messages.create({
                from: WA_NUMBER,
                to:   `whatsapp:${telefono}`,
                body: mensaje
              });

              const { data: sesion } = await supabase
                .from('wa_sesiones').select('history').eq('telefono', telefono).single();

              const history = Array.isArray(sesion?.history) ? sesion.history : [];
              // Limitar history a 200 mensajes
              if (history.length >= 200) history.splice(0, history.length - 199);
              history.push({
                role: 'assistant', content: mensaje,
                agente: agente_nombre || 'Agente',
                ts: new Date().toISOString()
              });

              await supabase.from('wa_sesiones')
                .update({ history, updated_at: new Date().toISOString() })
                .eq('telefono', telefono);

              res.json({ ok: true, sid: msg.sid });
            } catch (err) {
              console.error('Error send:', err.message);
              res.status(500).json({ error: err.message });
            }
          });

          // ── CLEANUP SESIONES ZOMBIE ──────────────────────────────
          // Cierra sesiones sin actividad por más de 24 horas
          async function cleanupZombies() {
            try {
              const hace24h = new Date(Date.now() - 24 * 60 * 60 * 1000).toISOString();
              const { data, error } = await supabase
                .from('wa_sesiones')
                .update({
                  estado: 'cerrado',
                  observacion_cierre: 'Cierre automático por inactividad (24h)',
                  updated_at: new Date().toISOString()
                })
                .neq('estado', 'cerrado')
                .lt('updated_at', hace24h);
              if (error) throw error;
              const n = data?.length || 0;
              if (n > 0) console.log(`🧹 Zombie cleanup: ${n} sesión(es) cerrada(s)`);
            } catch(e) {
              console.error('Error cleanup zombies:', e.message);
            }
          }

          // Ejecutar cleanup cada hora
          setInterval(cleanupZombies, 60 * 60 * 1000);
          // Y también al iniciar
          setTimeout(cleanupZombies, 5000);

          app.listen(PORT, () => console.log(`✅ webhook-twilio corriendo en :${PORT}`));
          JSEOF
          echo "✅ webhook-twilio/server.js generado"

      # ── 7c. GENERAR webhook-twilio/.env ─────────────────────────
      - name: Generar webhook-twilio/.env
        run: |
          cat > webhook-twilio/.env << 'ENVEOF'
          TWILIO_ACCOUNT_SID=${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN=${{ secrets.TWILIO_AUTH_TOKEN }}
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY=${{ secrets.SUPABASE_KEY_SERVICE }}
          NOVA_TOKEN=${{ secrets.NOVA_TOKEN }}
          PORT=3000
          ENVEOF
          echo "✅ webhook-twilio/.env generado"

      # ── 7d. COPIAR webhook-twilio al VPS ────────────────────────
      - name: Copiar webhook-twilio al VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.VPS_WEB_HOST }}
          username: root
          key:      ${{ secrets.VPS_SSH_KEY }}
          source:   "webhook-twilio/"
          target:   /opt/webhook-twilio/
          strip_components: 1

      # ── 7e. INSTALAR DEPS Y REINICIAR PM2 ───────────────────────
      - name: Reiniciar webhook-twilio con PM2
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.VPS_WEB_HOST }}
          username: root
          key:      ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/webhook-twilio
            # npm install con versiones exactas del package.json
            npm install --omit=dev
            if pm2 list | grep -q "webhook-twilio"; then
              pm2 restart webhook-twilio
              echo "✅ PM2 reiniciado"
            else
              pm2 start server.js --name webhook-twilio
              pm2 save
              echo "✅ PM2 iniciado por primera vez"
            fi
            sleep 2
            curl -sf http://localhost:3000 && echo "✅ webhook-twilio OK" || echo "❌ No responde"

      # ── 8. MIGRAR TABLAS SUPABASE ──────────────────────────────
      - name: Migrar tablas Supabase
        continue-on-error: true
        run: |
          SB_URL="${{ secrets.SUPABASE_URL }}"
          SB_KEY="${{ secrets.SUPABASE_KEY_SERVICE }}"
          run_sql() {
            local sql="$1"
            local json_body
            json_body=$(printf '{"query":"%s"}' "$(echo "$sql" | sed 's/"/\\"/g')")
            curl -s -o /dev/null -w "%{http_code}" -X POST "${SB_URL}/rest/v1/rpc/exec_sql" \
              -H "apikey: ${SB_KEY}" -H "Authorization: Bearer ${SB_KEY}" \
              -H "Content-Type: application/json" -d "$json_body"
          }
          CODE=$(run_sql "ALTER TABLE correos ADD COLUMN IF NOT EXISTS origen text DEFAULT 'web';")
          [ "$CODE" = "200" ] && echo "✅ correos.origen OK" || echo "⚠️ $CODE"
          CODE=$(run_sql "ALTER TABLE correos ADD COLUMN IF NOT EXISTS resumen_ia text;")
          [ "$CODE" = "200" ] && echo "✅ correos.resumen_ia OK" || echo "⚠️ $CODE"
          CODE=$(run_sql "ALTER TABLE correos ADD COLUMN IF NOT EXISTS fecha_resolucion timestamptz;")
          [ "$CODE" = "200" ] && echo "✅ correos.fecha_resolucion OK" || echo "⚠️ $CODE"
          CODE=$(run_sql "ALTER TABLE correos ADD COLUMN IF NOT EXISTS adjuntos_pendientes boolean DEFAULT false;")
          [ "$CODE" = "200" ] && echo "✅ correos.adjuntos_pendientes OK" || echo "⚠️ $CODE"
          CODE=$(run_sql "ALTER TABLE correos ADD COLUMN IF NOT EXISTS is_draft boolean DEFAULT false;")
          [ "$CODE" = "200" ] && echo "✅ correos.is_draft OK" || echo "⚠️ $CODE"
          CODE=$(run_sql "ALTER TABLE correos ADD COLUMN IF NOT EXISTS sent_at timestamptz;")
          [ "$CODE" = "200" ] && echo "✅ correos.sent_at OK" || echo "⚠️ $CODE"
          # ── Migrar wa_sesiones — nuevas columnas Nova TD ──
          CODE=$(run_sql "ALTER TABLE wa_sesiones ADD COLUMN IF NOT EXISTS cedula text;")
          [ "$CODE" = "200" ] && echo "✅ wa_sesiones.cedula OK" || echo "⚠️ $CODE"
          CODE=$(run_sql "ALTER TABLE wa_sesiones ADD COLUMN IF NOT EXISTS ciudad text DEFAULT '';")
          [ "$CODE" = "200" ] && echo "✅ wa_sesiones.ciudad OK" || echo "⚠️ $CODE"
          CODE=$(run_sql "ALTER TABLE wa_sesiones ADD COLUMN IF NOT EXISTS intentos_nova integer DEFAULT 0;")
          [ "$CODE" = "200" ] && echo "✅ wa_sesiones.intentos_nova OK" || echo "⚠️ $CODE"
          CODE=$(run_sql "ALTER TABLE wa_sesiones ADD COLUMN IF NOT EXISTS resumen_nova text;")
          [ "$CODE" = "200" ] && echo "✅ wa_sesiones.resumen_nova OK" || echo "⚠️ $CODE"
          CODE=$(run_sql "ALTER TABLE wa_sesiones ADD COLUMN IF NOT EXISTS origen_canal text DEFAULT 'whatsapp_directo';")
          [ "$CODE" = "200" ] && echo "✅ wa_sesiones.origen_canal OK" || echo "⚠️ $CODE"
          echo "✅ Migración completada"

      # ── 9. CONFIGURAR CRON ──────────────────────────────────────
      - name: Configurar cron sync
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.VPS_WEB_HOST }}
          username: root
          key:      ${{ secrets.VPS_SSH_KEY }}
          script: |
            CRON_LINE="* * * * * php /var/www/pqr/sincronizar-correos.php >> /var/log/sync-correos.log 2>&1"
            if ! crontab -l 2>/dev/null | grep -q "sincronizar-correos.php"; then
              (crontab -l 2>/dev/null; echo "$CRON_LINE") | crontab -
              echo "✅ Cron configurado"
            else
              echo "✅ Cron ya existía"
            fi
            touch /var/log/sync-correos.log && chmod 644 /var/log/sync-correos.log

      # ── 10. VERIFICAR DEPLOY ────────────────────────────────────
      - name: Verificar deploy
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.VPS_WEB_HOST }}
          username: root
          key:      ${{ secrets.VPS_SSH_KEY }}
          script: |
            ERRORS=0
            for f in /var/www/pqr/radicar-pqr.php /var/www/pqr/sincronizar-correos.php \
                     /var/www/pqr/nova-td-respuesta.php /var/www/pqr/login.php \
                     /var/www/pqr/whatsapp-webhook.php; do
              [ -f "$f" ] || continue
              OUT=$(php -l "$f" 2>&1)
              if echo "$OUT" | grep -q "No syntax errors"; then
                echo "✅ $(basename $f)"
              else
                echo "❌ $(basename $f): $OUT"
                ERRORS=$((ERRORS+1))
              fi
            done
            FOUND=$(grep -rl '__SB_URL__\|__SB_KEY__\|__ADMIN_TOKEN__\|__ANTHROPIC_KEY__' \
              /var/www/pqr/*.php 2>/dev/null || true)
            if [ -n "$FOUND" ]; then
              echo "❌ Placeholders en: $FOUND"
              ERRORS=$((ERRORS+1))
            else
              echo "✅ Sin placeholders residuales"
            fi
            [ $ERRORS -gt 0 ] && exit 1
            echo "✅ Deploy OK — $(date '+%d/%m/%Y %H:%M') hora Colombia"
