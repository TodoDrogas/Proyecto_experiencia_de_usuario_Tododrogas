<!-- ─────────────────────────────────────────────────────────────────
  FRAGMENTO D: Inicialización y sincronización de campos
  (pegar en tu bloque <script> de inicio, después del DOM listo)
───────────────────────────────────────────────────────────────────── -->
<script>
// ── Credenciales Supabase — ajusta estas dos líneas ──────────────────
// Usa las mismas constantes que ya tienes en tu archivo:
//   const SB_URL  = '...' y const SB_ANON = '...'
// Si ya están definidas en el mismo script, simplemente referencia:
//   GeoSede.init(SB_URL, SB_ANON, onSedeDetectada);

document.addEventListener('DOMContentLoaded', function () {

  // 1) Mostrar badge de carga inmediatamente
  GeoSede.renderBadge('geo-sede-badge');

  // 2) Inicializar GeoSede: detecta GPS + carga sedes + resuelve la más cercana
  //    Reemplaza SB_URL y SB_ANON con tus constantes reales
  GeoSede.init(
    window.SB_URL  || 'https://TU_PROYECTO.supabase.co',
    window.SB_ANON || 'TU_ANON_KEY',
    function onSedeDetectada(sede) {
      // Llamado cuando la sede queda resuelta (GPS, manual o primera activa)
      if (sede) {
        sincronizarCamposSede(sede);
      }
      // Actualizar badge (ya tiene la sede o sigue en loading)
      GeoSede.renderBadge('geo-sede-badge');
    }
  );

});

/**
 * Sincroniza los campos ocultos con la sede activa.
 * Llama esta función también después de que el usuario cambie la sede.
 */
function sincronizarCamposSede(sede) {
  if (!sede) return;
  var setVal = function(id, val) {
    var el = document.getElementById(id);
    if (el) el.value = val || '';
  };
  setVal('campo-sede-id',        sede.id        || '');
  setVal('campo-sede-nombre',    sede.nombre    || '');
  setVal('campo-sede-ciudad',    sede.ciudad    || '');
  setVal('campo-sede-direccion', sede.direccion || '');
  // sede_manual: true si la clave 'geo_sede_manual' existe en sessionStorage
  var esManual = !!sessionStorage.getItem('geo_sede_manual');
  setVal('campo-sede-manual', esManual ? 'true' : 'false');
}

/**
 * Llama esto cuando el usuario confirma un cambio manual de sede
 * (GeoSede ya lo hace internamente, pero si necesitas re-sincronizar
 * los campos después del modal, agrega este listener aquí).
 */
var _geoSedePollTimer = setInterval(function () {
  var sede = GeoSede.getSede();
  if (sede) {
    sincronizarCamposSede(sede);
    // Badge ya actualizado por GeoSede internamente, pero refrescamos por si acaso
    GeoSede.renderBadge('geo-sede-badge');
  }
}, 2000); // Revisa cada 2 s por si el usuario cambió la sede


// ─────────────────────────────────────────────────────────────────────
// FRAGMENTO E: Leer la sede al enviar el formulario (en tu función de envío)
// ─────────────────────────────────────────────────────────────────────

//

//     // SEDE — campos de geolocalización
//     sede_id:        sede.id        || null,
//     sede_nombre:    sede.nombre    || '',
//     sede_ciudad:    sede.ciudad    || '',
//     sede_direccion: sede.direccion || '',
//     sede_manual:    !!sessionStorage.getItem('geo_sede_manual'),
//     // ... resto de campos
//   };
//
// Para radicar-pqr.php estos campos ya están implementados en el backend.
// Para radicar-encuesta.php (encuestas), los campos llegan como:
//   sede_id, sede_nombre, sede_ciudad, sede_manual
// y el PHP los lee con: $body['sede_id'] ?? ''
// ─────────────────────────────────────────────────────────────────────

</script>
