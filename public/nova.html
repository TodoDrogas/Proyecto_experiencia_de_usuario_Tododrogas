<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Nova TD · Tododrogas</title>
<script src="config.js" onerror="console.warn('config.js no cargó')"></script>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root{
  --blue:#1d6ae5;--bd:#1452c8;--bl:rgba(29,106,229,.13);
  --cyan:#38bdf8;--green:#22c55e;--gold:#f59e0b;--red:#ef4444;
  --t:rgba(240,246,255,.96);--t2:rgba(180,210,255,.62);--t3:rgba(110,150,210,.35);
  --f:'Sora',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:var(--f);background:#03060f;color:var(--t);overflow:hidden}

/* Página completa — el chat ocupa toda la pantalla */
body::before{content:'';position:fixed;inset:0;pointer-events:none;
  background:radial-gradient(ellipse 80% 55% at 5% 0%,rgba(29,106,229,.08) 0%,transparent 55%),
             radial-gradient(ellipse 55% 45% at 95% 100%,rgba(56,189,248,.05) 0%,transparent 50%)}

/* Contenedor principal ocupa toda la pantalla */
.ntd-app{
  display:flex;flex-direction:column;
  height:100dvh;width:100%;max-width:680px;
  margin:0 auto;position:relative;
  background:#03060f;
}

/* En desktop: centrado con borde */
@media(min-width:680px){
  body{display:flex;align-items:center;justify-content:center;background:#020408}
  .ntd-app{
    height:90dvh;border-radius:20px;
    border:1px solid rgba(255,255,255,.07);
    box-shadow:0 40px 100px rgba(0,0,0,.8);
    overflow:hidden;
  }
}

/* ════ NOVA TD MODAL ════ */
/* .overlay no aplica en página independiente */
.chat-modal{
  width:min(500px,96vw);height:min(800px,95dvh);
  background:#04080f;border:1px solid rgba(37,99,235,.22);
  border-radius:22px;
  box-shadow:0 48px 120px rgba(0,0,0,.88),0 0 0 1px rgba(255,255,255,.03);
  display:flex;flex-direction:column;overflow:hidden;
  transform:scale(.9) translateY(40px);
  transition:transform .38s cubic-bezier(.34,1.4,.64,1);
  position:relative;
}
/* .overlay.open no aplica */
@media(max-width:600px){
  .chat-modal{width:100vw!important;height:100dvh!important;border-radius:0!important;border:none!important;}

}
/* ── Nova TD interna ── */
.ntd-app{display:flex;flex-direction:column;height:100%;font-family:'Sora',sans-serif;}
.ntd-hdr{flex-shrink:0;display:flex;align-items:center;gap:10px;padding:11px 14px;
  background:rgba(4,8,15,.95);border-bottom:1px solid rgba(255,255,255,.07);}
.ntd-av{width:36px;height:36px;border-radius:50%;flex-shrink:0;position:relative;overflow:hidden;
  background:linear-gradient(135deg,#1a45c4,#2563eb,#0284c7);
  display:flex;align-items:center;justify-content:center;font-size:15px;
  box-shadow:0 0 0 2px rgba(37,99,235,.45),0 0 14px rgba(37,99,235,.25);
  animation:ntdAp 3.5s ease-in-out infinite;}
@keyframes ntdAp{0%,100%{box-shadow:0 0 0 2px rgba(37,99,235,.45),0 0 14px rgba(37,99,235,.25)}
  50%{box-shadow:0 0 0 3px rgba(37,99,235,.65),0 0 24px rgba(37,99,235,.45)}}
.ntd-av img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.ntd-odot{position:absolute;bottom:1px;right:1px;width:10px;height:10px;border-radius:50%;
  background:#10b981;border:2px solid #04080f;box-shadow:0 0 6px rgba(16,185,129,.7);
  animation:ntdBl 2s infinite;}
@keyframes ntdBl{0%,100%{opacity:1}50%{opacity:.3}}
.ntd-info{flex:1;min-width:0;}
.ntd-name{font-size:13px;font-weight:700;color:rgba(232,240,254,.95);letter-spacing:-.1px;}
.ntd-sub{font-size:10px;color:#10b981;display:flex;align-items:center;gap:4px;margin-top:1px;}
.ntd-dots{display:none;align-items:center;gap:3px;}
.ntd-dots.on{display:flex;}
.ntd-d{width:4px;height:4px;border-radius:50%;background:#10b981;animation:ntdTb .7s ease-in-out infinite;}
.ntd-d:nth-child(2){animation-delay:.14s;}.ntd-d:nth-child(3){animation-delay:.28s;}
@keyframes ntdTb{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
.ntd-step{font-size:10px;font-weight:600;padding:3px 9px;border-radius:99px;
  background:rgba(37,99,235,.13);border:1px solid rgba(37,99,235,.22);
  color:rgba(147,197,253,.8);white-space:nowrap;}
.ntd-close{width:30px;height:30px;border-radius:8px;background:rgba(255,255,255,.07);
  border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.5);font-size:13px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .17s;flex-shrink:0;}
.ntd-close:hover{background:rgba(255,255,255,.14);color:#fff;}
.ntd-pbar{flex-shrink:0;height:2px;background:rgba(255,255,255,.05);overflow:hidden;}
.ntd-pfill{height:100%;background:linear-gradient(90deg,#1a45c4,#2563eb,#00b0ff);
  transition:width .55s cubic-bezier(.4,0,.2,1);box-shadow:0 0 7px rgba(37,99,235,.5);}
.ntd-msgs{flex:1;overflow-y:auto;padding:14px 12px 7px;display:flex;flex-direction:column;gap:3px;scroll-behavior:smooth;}
.ntd-msgs::-webkit-scrollbar{width:3px;}
.ntd-msgs::-webkit-scrollbar-thumb{background:rgba(37,99,235,.25);border-radius:99px;}
.ntd-sep{text-align:center;font-size:10px;color:rgba(130,165,220,.35);letter-spacing:.5px;
  margin:8px 0 4px;display:flex;align-items:center;gap:7px;}
.ntd-sep::before,.ntd-sep::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.07);}
.ntd-mr{display:flex;gap:7px;max-width:100%;animation:ntdMi .25s cubic-bezier(.22,1,.36,1) both;}
@keyframes ntdMi{from{opacity:0;transform:translateY(8px) scale(.98)}to{opacity:1;transform:none}}
.ntd-mr.u{flex-direction:row-reverse;}
.ntd-mav{width:27px;height:27px;border-radius:50%;flex-shrink:0;align-self:flex-end;
  display:flex;align-items:center;justify-content:center;font-size:11px;overflow:hidden;}
.ntd-mav.n{background:linear-gradient(135deg,#1a45c4,#2563eb);box-shadow:0 0 9px rgba(37,99,235,.35);}
.ntd-mav.n img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.ntd-mav.us{background:linear-gradient(135deg,#0f766e,#0d9488);font-weight:700;color:#fff;font-size:11px;}
.ntd-mb{max-width:calc(100% - 37px);}
.ntd-mr.u .ntd-mb{display:flex;flex-direction:column;align-items:flex-end;}
.ntd-bub{padding:10px 14px;border-radius:16px;font-size:13px;line-height:1.6;word-break:break-word;color:rgba(232,240,254,.95);font-family:'Sora',sans-serif;}
.ntd-bub.n{background:linear-gradient(135deg,#0d1b2e,#111e35);border:1px solid rgba(56,189,248,.12);border-bottom-left-radius:4px;}
.ntd-bub.u{background:linear-gradient(135deg,#1a45c4,#2563eb);border-bottom-right-radius:4px;color:#fff;box-shadow:0 3px 13px rgba(37,99,235,.38);}
.ntd-bub p{margin-bottom:4px;font-size:13px;}.ntd-bub p:last-child{margin-bottom:0;}
.ntd-bub strong{font-weight:600;color:#7dd3fc;}.ntd-bub.u strong{color:rgba(255,255,255,.95);}
.ntd-bub ul{padding-left:0;margin:4px 0;list-style:none;}
.ntd-bub li{padding:2px 0;padding-left:13px;position:relative;}
.ntd-bub li::before{content:'›';position:absolute;left:0;color:#00b0ff;font-weight:700;}
.ntd-bub a{color:#93c5fd;text-decoration:underline;}
@keyframes ntdMicPulse{0%,100%{box-shadow:0 0 0 4px rgba(0,195,154,.25),0 0 16px rgba(0,195,154,.4)}50%{box-shadow:0 0 0 8px rgba(0,195,154,.1),0 0 24px rgba(0,195,154,.6)}}
#ntdMicLbl{display:none;text-align:center;font-size:11px;color:#00c39a;font-weight:600;padding:4px 0 2px;letter-spacing:.2px;font-family:'Sora',sans-serif;}
.ntd-mt{font-size:10px;color:rgba(130,165,220,.35);margin-top:2px;padding:0 2px;}
.ntd-sk{display:flex;gap:7px;}
.ntd-skb{display:flex;gap:5px;align-items:center;padding:10px 13px;
  background:#141e30;border:1px solid rgba(37,99,235,.1);
  border-radius:15px;border-bottom-left-radius:4px;}
.ntd-skd{width:6px;height:6px;border-radius:50%;background:rgba(37,99,235,.45);
  animation:ntdSp 1s ease-in-out infinite;}
.ntd-skd:nth-child(2){animation-delay:.18s;}.ntd-skd:nth-child(3){animation-delay:.36s;}
@keyframes ntdSp{0%,100%{opacity:.28;transform:scale(.8)}50%{opacity:1;transform:scale(1.2)}}
.ntd-chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px;}
.ntd-ch{display:inline-flex;align-items:center;gap:4px;padding:6px 12px;border-radius:99px;
  font-size:11px;font-weight:600;cursor:pointer;border:1px solid;
  transition:all .16s;white-space:nowrap;font-family:'Sora',sans-serif;background:none;}
.ntd-ch.b{background:rgba(37,99,235,.13);border-color:rgba(37,99,235,.35);color:#93c5fd;}
.ntd-ch.b:hover{background:rgba(37,99,235,.22);transform:translateY(-1px);}
.ntd-ch.g{background:rgba(16,185,129,.12);border-color:rgba(16,185,129,.3);color:#6ee7b7;}
.ntd-ch.g:hover{background:rgba(16,185,129,.2);transform:translateY(-1px);}
.ntd-ch.go{background:rgba(212,175,55,.1);border-color:rgba(212,175,55,.3);color:#fde68a;}
.ntd-ch.go:hover{background:rgba(212,175,55,.18);transform:translateY(-1px);}
.ntd-ch.r{background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.3);color:#fca5a5;}
.ntd-ch.r:hover{background:rgba(239,68,68,.2);transform:translateY(-1px);}
.ntd-ic{background:#0e1525;border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:11px 13px;margin-top:7px;}
.ntd-ict{font-size:10px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:rgba(130,165,220,.35);margin-bottom:7px;}
.ntd-ir{display:flex;align-items:flex-start;gap:7px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.04);}
.ntd-ir:last-child{border:none;}
.ntd-il{font-size:11px;color:rgba(130,165,220,.35);min-width:78px;flex-shrink:0;padding-top:1px;}
.ntd-iv{font-size:11px;color:rgba(232,240,254,.95);font-weight:500;}
.ntd-badge{display:inline-block;padding:2px 7px;border-radius:99px;font-size:10px;font-weight:600;}
.ntd-by{background:rgba(245,158,11,.15);color:#fcd34d;}
.ntd-bg{background:rgba(16,185,129,.15);color:#6ee7b7;}
.ntd-bb{background:rgba(37,99,235,.13);color:#93c5fd;}
.ntd-br{background:rgba(239,68,68,.15);color:#fca5a5;}
.ntd-qbar{flex-shrink:0;padding:5px 12px 2px;display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;}
.ntd-qbar::-webkit-scrollbar{display:none;}
.ntd-qc{flex-shrink:0;display:inline-flex;align-items:center;gap:3px;padding:5px 10px;border-radius:99px;
  font-size:11px;font-weight:500;white-space:nowrap;cursor:pointer;
  background:#141e30;border:1px solid rgba(255,255,255,.07);color:rgba(190,215,255,.6);transition:all .16s;}
.ntd-qc:hover{background:rgba(37,99,235,.13);border-color:rgba(37,99,235,.22);color:#93c5fd;}
.ntd-ia{flex-shrink:0;padding:6px 11px 12px;background:rgba(4,8,15,.93);border-top:1px solid rgba(255,255,255,.07);}
.ntd-ib{display:flex;align-items:flex-end;gap:6px;background:#141e30;
  border:1.5px solid rgba(255,255,255,.07);border-radius:17px;padding:6px 6px 6px 13px;
  transition:border-color .2s,box-shadow .2s;}
.ntd-ib:focus-within{border-color:rgba(37,99,235,.5);box-shadow:0 0 0 3px rgba(37,99,235,.08);}
.ntd-it{flex:1;background:none;border:none;outline:none;color:rgba(232,240,254,.95);
  font-family:'Sora',sans-serif;font-size:13px;line-height:1.5;resize:none;
  max-height:100px;min-height:21px;padding:2px 0;}
.ntd-it::placeholder{color:rgba(130,165,220,.35);}.ntd-it:disabled{opacity:.35;cursor:not-allowed;}
.ntd-ibtn{width:30px;height:30px;border-radius:8px;background:none;border:1px solid rgba(255,255,255,.07);
  color:rgba(130,165,220,.35);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .16s;flex-shrink:0;}
.ntd-ibtn:hover{background:rgba(37,99,235,.13);border-color:rgba(37,99,235,.22);color:rgba(190,215,255,.6);}
.ntd-ibtn.rec{background:rgba(239,68,68,.13);border-color:rgba(239,68,68,.3);color:#fca5a5;animation:ntdRp 1s infinite;}
@keyframes ntdRp{0%,100%{opacity:1}50%{opacity:.45}}
/* ── AUDIO WHATSAPP STYLE ── */
.ntd-rec-bar{display:none;flex:1;align-items:center;gap:10px;padding:0 4px}
.ntd-rec-bar.on{display:flex}
.ntd-rec-dot{width:8px;height:8px;border-radius:50%;background:#ef4444;flex-shrink:0;
  animation:ntdDot 1s ease-in-out infinite}
@keyframes ntdDot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
.ntd-rec-time{font-size:12px;font-weight:600;color:var(--t2);
  font-family:'JetBrains Mono',monospace;min-width:36px}
.ntd-rec-wave{flex:1;display:flex;align-items:center;gap:2px;height:24px}
.ntd-rec-wave span{display:inline-block;width:3px;border-radius:99px;
  background:rgba(37,99,235,.5);animation:ntdWave .8s ease-in-out infinite}
.ntd-rec-wave span:nth-child(1){animation-delay:0s;height:4px}
.ntd-rec-wave span:nth-child(2){animation-delay:.1s;height:10px}
.ntd-rec-wave span:nth-child(3){animation-delay:.2s;height:18px}
.ntd-rec-wave span:nth-child(4){animation-delay:.1s;height:12px}
.ntd-rec-wave span:nth-child(5){animation-delay:.3s;height:20px}
.ntd-rec-wave span:nth-child(6){animation-delay:.15s;height:8px}
.ntd-rec-wave span:nth-child(7){animation-delay:.25s;height:16px}
.ntd-rec-wave span:nth-child(8){animation-delay:.05s;height:6px}
@keyframes ntdWave{0%,100%{transform:scaleY(.3);background:rgba(37,99,235,.4)}
  50%{transform:scaleY(1);background:var(--blue)}}
.ntd-rec-cancel{width:28px;height:28px;border-radius:50%;border:none;
  background:rgba(239,68,68,.15);color:#fca5a5;font-size:13px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .17s;flex-shrink:0}
.ntd-rec-cancel:hover{background:rgba(239,68,68,.3)}
.ntd-vbtn-mic{width:28px;height:28px;border-radius:50%;flex-shrink:0;
  background:rgba(37,99,235,.18);border:1px solid rgba(37,99,235,.3);color:rgba(147,197,253,.6);
  font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .2s;box-shadow:none}
.ntd-vbtn-mic:hover{transform:scale(1.08)}
.ntd-vbtn-mic:active{transform:scale(.94)}
.ntd-vbtn-mic.rec{background:linear-gradient(135deg,#b91c1c,#ef4444);
  box-shadow:0 0 0 6px rgba(239,68,68,.15),0 2px 12px rgba(239,68,68,.4);
  animation:ntdMicPulse 1.2s ease-in-out infinite}
@keyframes ntdMicPulse{
  0%,100%{box-shadow:0 0 0 4px rgba(239,68,68,.2),0 2px 10px rgba(239,68,68,.4)}
  50%{box-shadow:0 0 0 10px rgba(239,68,68,.08),0 2px 18px rgba(239,68,68,.5)}}
.ntd-sb{width:34px;height:34px;border-radius:10px;flex-shrink:0;
  background:linear-gradient(135deg,#1a45c4,#2563eb);border:none;color:#fff;font-size:14px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .19s;box-shadow:0 3px 11px rgba(37,99,235,.38);}
.ntd-sb:hover{transform:scale(1.08);box-shadow:0 5px 17px rgba(37,99,235,.55);}
.ntd-sb:active{transform:scale(.94);}
.ntd-sb:disabled{opacity:.3;cursor:not-allowed;transform:none;box-shadow:none;}
/* VIP modal */
.ntd-vipbg{position:absolute;inset:0;z-index:50;background:rgba(1,3,8,.97);backdrop-filter:blur(20px);
  display:none;align-items:center;justify-content:center;padding:20px;border-radius:22px;}
.ntd-vipbg.on{display:flex;}
.ntd-vipm{position:relative;overflow:hidden;
  background:linear-gradient(160deg,rgba(10,8,2,.99),rgba(18,14,4,.99));
  border:1px solid rgba(212,175,55,.42);border-radius:4px;
  padding:38px 34px 30px;max-width:380px;width:100%;text-align:center;
  animation:ntdVi .5s cubic-bezier(.16,1,.3,1) both;
  box-shadow:0 0 0 1px rgba(212,175,55,.1),0 30px 80px rgba(0,0,0,.99);}
@keyframes ntdVi{from{transform:translateY(22px) scale(.96);opacity:0}to{transform:none;opacity:1}}
.ntd-vipm::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(212,175,55,.9) 30%,rgba(255,235,150,.6) 50%,rgba(212,175,55,.9) 70%,transparent);}
.ntd-vip-ey{font-size:9px;font-weight:500;letter-spacing:3.5px;text-transform:uppercase;
  color:rgba(212,175,55,.6);margin-bottom:16px;display:flex;align-items:center;justify-content:center;gap:9px;}
.ntd-vip-ey::before,.ntd-vip-ey::after{content:'';width:22px;height:1px;background:rgba(212,175,55,.38);}
.ntd-vip-mo{width:52px;height:52px;border-radius:2px;border:1px solid rgba(212,175,55,.5);
  display:flex;align-items:center;justify-content:center;margin:0 auto 18px;
  background:linear-gradient(145deg,rgba(212,175,55,.07),rgba(212,175,55,.02));}
.ntd-vip-mi{width:2px;height:22px;background:linear-gradient(180deg,transparent,rgba(212,175,55,.8),transparent);position:relative;}
.ntd-vip-mi::before{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:22px;height:2px;background:linear-gradient(90deg,transparent,rgba(212,175,55,.8),transparent);}
.ntd-vip-msg{font-size:14px;color:rgba(230,220,200,.88);line-height:1.8;margin-bottom:22px;font-weight:300;}
.ntd-vip-btn{display:inline-flex;align-items:center;gap:6px;background:none;
  border:1px solid rgba(212,175,55,.5);border-radius:3px;padding:9px 22px;
  font-size:11px;font-weight:600;letter-spacing:.7px;text-transform:uppercase;
  color:rgba(212,175,55,.9);cursor:pointer;font-family:'Sora',sans-serif;transition:all .2s;}
.ntd-vip-btn:hover{background:rgba(212,175,55,.08);}
/* Modal error validación */
.ntd-valbg{position:absolute;inset:0;z-index:40;background:rgba(0,0,0,.85);backdrop-filter:blur(14px);
  display:none;align-items:center;justify-content:center;padding:18px;border-radius:22px;}
.ntd-valbg.on{display:flex;}
.ntd-valm{background:#141e30;border:1px solid rgba(239,68,68,.28);border-radius:16px;
  padding:22px;max-width:290px;width:100%;text-align:center;animation:ntdVai .3s cubic-bezier(.34,1.56,.64,1) both;}
@keyframes ntdVai{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:none}}
.ntd-val-ico{font-size:30px;margin-bottom:8px;}
.ntd-val-msg{font-size:12px;color:rgba(190,215,255,.6);line-height:1.7;margin-bottom:12px;}
.ntd-val-bw{height:3px;background:rgba(255,255,255,.07);border-radius:99px;overflow:hidden;margin-bottom:10px;}
.ntd-val-b{height:100%;background:#ef4444;border-radius:99px;width:100%;transition:width 12s linear;}
.ntd-val-cd{font-size:11px;color:rgba(130,165,220,.35);margin-bottom:12px;}
.ntd-val-cl{padding:8px 20px;border-radius:9px;background:rgba(239,68,68,.13);
  border:1px solid rgba(239,68,68,.28);color:#fca5a5;font-size:12px;font-weight:600;
  cursor:pointer;font-family:'Sora',sans-serif;transition:all .16s;}
.ntd-val-cl:hover{background:rgba(239,68,68,.22);}

/* Modal header */
.mh{padding:16px 18px;border-bottom:1px solid rgba(255,255,255,.07);
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(37,99,235,.07);flex-shrink:0;}
.mh-left{display:flex;align-items:center;gap:12px;}
.mh-av{width:44px;height:44px;border-radius:50%;
  background:transparent;
  display:flex;align-items:center;justify-content:center;font-size:22px;
  box-shadow:0 0 0 2px rgba(37,99,235,.35);
  animation:float 5s ease-in-out infinite;overflow:hidden;}
.mh-name{font-size:14px;font-weight:700;color:#fff;}

   Estrategia: clamp() para todo, breakpoints solo para cambios de layout
   ════════════════════════════════════════════════════════════════════ */

/* ── Tablet (< 900px): sigue siendo 2 columnas pero más compacto ── */
@media (max-width:900px){
  .right{
    width:clamp(280px,42vw,380px);

  .carousel-text{font-size:clamp(20px,3.2vw,36px);}

/* ── Móvil / pantalla angosta (< 650px): una sola columna ── */
@media (max-width:650px){
  html,body{overflow-x:hidden;overflow-y:auto;height:auto;}
  .layout{
    flex-direction:column;
    min-height:100svh;
    min-height:100vh;
  }
  /* Panel QR primero (arriba) */
  .right{
    order:1;
    width:100% !important;
    max-width:100%;
    flex-shrink:0;
    height:auto;
    overflow-y:visible;
    padding:20px 16px 16px;

    border-bottom:1px solid rgba(255,255,255,.07);

  }

  .left{
    order:2;
    flex:none;
    width:100%;
    min-height:50vh;

  }

  .qr-frame{padding:12px !important;margin:0 !important;}

  .rp-title{font-size:clamp(22px,7vw,32px);}
  .rp-sub{font-size:12px;}
  /* Carrusel compacto */
  .carousel-section{padding:14px 16px 10px;}
  .carousel-text{font-size:clamp(18px,6vw,28px);}

  .agent-right{

}

  }

}

<script>
/* ══ NOVA TD — PÁGINA INDEPENDIENTE ══════════════════
   Canal: nova_directo
   Arranque automático al cargar la página
════════════════════════════════════════════════════ */

/* ── Nova TD independiente — arranque directo ── */

// Sin modal — el chat es la página completa
let _ntdCierreTimer = null;

function ntdReset(){
  // Limpia todo el estado de NTD y reinicia desde 0
  clearTimeout(_ntdCierreTimer);
  _ntdCierreTimer = null;
  NTD.fase      = 'politica';
  NTD.usuario   = null;
  NTD.eps       = null;
  NTD._ced      = null;
  NTD._nom      = null;
  NTD._tel      = null;
  NTD._tipoDoc  = 'CÉDULA DE CIUDADANÍA';
  NTD._enMenu   = false;
  NTD.hist      = [];
  NTD.busy      = false;
  NTD.vipCb     = null;
  NTD.arrancado = false;
  // Resetear métricas de sesión
  NTD._sesionId      = null;
  NTD._sesionInicio  = null;
  NTD._menuUsados    = [];
  NTD._preguntasLibres = 0;
  NTD._calificacion  = null;
  NTD._consultas     = 0;
  NTD._encuestaVista = false;
  clearTimeout(_ntdResTimer);
  _ntdOfrecioAyuda   = false;
  // Limpiar mensajes del DOM
  const m = ntd$('ntdMsgs');
  if(m) m.innerHTML = '';
  // Limpiar qbar
  const q = ntd$('ntdQbar');
  if(q){ q.innerHTML=''; q.style.display='none'; }
  // Resetear progreso y header
  ntdProg(4, 'Inicio');
  // Limpiar input
  const ta = ntd$('ntdTa');
  if(ta){ ta.value=''; ta.style.height='auto'; ta.disabled=true; }
  ntd$('ntdSBtn').disabled = true;
}

function openChat(){
  clearTimeout(_ntdCierreTimer);
  _ntdCierreTimer = null;
  /* no-op en página independiente */
  if(!NTD.arrancado){
    NTD.arrancado = true;
    ntdStart();
  }
  // Resetear timer de inactividad interna si existe
  if(typeof ntdResetInact === 'function') ntdResetInact();
}

function openChatVoice(){ openChat(); }

function closeChat(){
  /* no-op en página independiente */
  // Si ya hay conversación activa, iniciar timer de 2 min
  // Al volver a abrir antes de 2 min → retoma. Después → nueva conversación
  if(NTD.arrancado){
    clearTimeout(_ntdCierreTimer);
    _ntdCierreTimer = setTimeout(()=>{
      ntdReset();
    }, 5 * 60 * 1000); // 5 minutos
  }
}

function onOvClick(){ /* no-op en página independiente */ }


const _url_params=new URLSearchParams(window.location.search);
const _BV_ORIGEN=_url_params.get('origen')||'nova_directo';
const _esQR=function(){return _BV_ORIGEN==='qr';};

const NOVA_IMG_URL = 'https://lyosqaqhiwhgvjigvqtc.supabase.co/storage/v1/object/public/logos-config/NOVA%20TD.png';

};
const NTD_EPS=['COOSALUD','SAVIA','SALUD TOTAL','NUEVA EPS','PREVENTIVA'];
const NTD={
  fase:'politica', usuario:null, eps:null,
  _ced:null,_nom:null,_tel:null,_tipoDoc:'CÉDULA DE CIUDADANÍA',
  hist:[], busy:false, vipCb:null, _valT:null, arrancado:false, _enMenu:false,
  _consultas:0, _encuestaVista:false,
  _sesionId:null, _sesionInicio:null, _menuUsados:[], _preguntasLibres:0,
};


// ── MÉTRICAS: registro de sesión en Supabase ────────────────
async function ntdAbrirSesion(){
  if(NTD._sesionId) return;
  NTD._sesionInicio = Date.now();
  try{
    const sbUrl=(typeof window.SUPABASE_URL!=='undefined'?window.SUPABASE_URL:'');
    const sbKey=(typeof window.SUPABASE_KEY!=='undefined'?window.SUPABASE_KEY:'');
    const r=await fetch(sbUrl+'/rest/v1/rpc/registrar_sesion_nova',{
      method:'POST',
      headers:{'apikey':sbKey,'Authorization':'Bearer '+sbKey,'Content-Type':'application/json'},
      body:JSON.stringify({
        p_cedula:   NTD.usuario?.cedula||'',
        p_nombre:   NTD.usuario?.nombre||'',
        p_eps:      NTD.eps||'',
        p_municipio:NTD.usuario?.ciudad||'',
        p_es_vip:   !!NTD.usuario?.vip,
        p_origen:   (typeof _BV_ORIGEN!=='undefined'?_BV_ORIGEN:'nova_web')
      })
    });
    if(r.ok){ const d=await r.json(); NTD._sesionId=d; }
  }catch(e){}
}

async function ntdCerrarSesion(motivo){
  if(!NTD._sesionId) return;
  const dur=Math.round((Date.now()-(NTD._sesionInicio||Date.now()))/1000);
  try{
    const sbUrl=(typeof window.SUPABASE_URL!=='undefined'?window.SUPABASE_URL:'');
    const sbKey=(typeof window.SUPABASE_KEY!=='undefined'?window.SUPABASE_KEY:'');
    await fetch(sbUrl+'/rest/v1/rpc/cerrar_sesion_nova',{
      method:'POST',
      headers:{'apikey':sbKey,'Authorization':'Bearer '+sbKey,'Content-Type':'application/json'},
      body:JSON.stringify({
        p_id:               NTD._sesionId,
        p_calificacion:     NTD._calificacion||'',
        p_menu_elegido:     NTD._menuUsados.join(','),
        p_consultas_count:  NTD._consultas,
        p_preguntas_libres: NTD._preguntasLibres,
        p_duracion_seg:     dur,
        p_motivo_cierre:    motivo||'usuario'
      })
    });
  }catch(e){}
}

function ntdR2H(raw){
  let t=raw.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\[([^\]]+)\]\((https?:\/\/[^\)]+)\)/g,'<a href="$2" target="_blank">$1</a>');
  const lines=t.split('\n'),out=[];let ul=false;
  for(const l of lines){const tr=l.trim();
    if(tr.startsWith('• ')||tr.startsWith('- ')){
      if(!ul){out.push('<ul>');ul=true;}out.push('<li>'+tr.slice(2)+'</li>');
    }else{if(ul){out.push('</ul>');ul=false;}if(tr)out.push('<p>'+tr+'</p>');}}
  if(ul)out.push('</ul>');
  return out.join('');
}

async function ntdSend(){
  const ta=ntd$('ntdTa'),txt=ta.value.trim();
  if(!txt||NTD.busy)return;
  ta.value='';ta.style.height='auto';ntdUS();
  // Mostrar al usuario como escribió, pero procesar siempre en MAYÚSCULAS
  const txtUp=txt.toUpperCase();
  ntdAddMsg('user',ntdR2H(txtUp)); // siempre en mayúsculas
  ntdResetInact();
  // Cancelar timer de 30s de encuesta — el usuario sigue activo
  clearTimeout(_ntdResTimer);
  NTD._encuestaVista=false;
  NTD.busy=true;ntdDis();
  try{await ntdDispatch(txtUp);}
  catch(e){ntdRmSk();ntdTyping(false);ntdAddMsg('nova',ntdR2H('Tuve un problema. Llama al **604 322 2432** o WhatsApp **304 341 2431**.'));}
  NTD.busy=false;ntdUS();
}

async function ntdDispatch(txt){
  if(NTD.fase==='politica')    return ntdFPolitica(txt);
  if(NTD.fase==='ident_ced')   return ntdFCedula(txt);
  if(NTD.fase==='eps')         return ntdFEps(txt);

  // Captura municipio para búsqueda de sedes
  if(NTD.fase==='municipio_sedes'){
    ntdAddMsg('nova', ntdR2H(`Buscando sedes en **${txt}** para **${NTD.eps||'tu EPS'}**...`));
    await ntdFetchSedes(txt);
    return;
  }
  // Atajo numérico — llama funciones DIRECTAMENTE, sin pasar por ntdSend
  if(NTD.fase==='libre'){
    const n=txt.trim().replace(/\D/g,'');
    const opc={
      '1':()=>ntdMedicamentos(),
      '2':()=>ntdSedes(),
      '3':()=>ntdRequisitosReclamar(),
      '4':()=>ntdAutorizacion(),
      '5':()=>ntdIrARadicar(),
      '6':()=>ntdConsultarRadicado(),
      '7':()=>ntdHorarios(),
      '8':()=>ntdEncuesta(),
    };
    if(opc[n]){NTD.busy=false;opc[n]();return;}
  }
  // Si parece radicado (TD-xxxxxx o correo), consultar directo sin pasar por GPT
  if(/^TD-[\d\-]+$/i.test(txt.trim())||/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(txt.trim())||/^\d{6,12}$/.test(txt.trim())){
    ntdAddMsg('nova',ntdR2H('Consultando tu radicado...'));
    await ntdFetchRadicado(txt.trim());
    return;
  }
  return ntdFLibre(txt);
}

async function ntdFCedula(txt){
  const n=txt.replace(/\D/g,'');
  if(n.length<5){
    ntdAddMsg('nova',ntdR2H('Número de documento inválido. Por favor escríbelo sin puntos ni comas:'));
    ntdEna('Por favor escriba su número de documento...');return;
  }
  NTD._ced=n;NTD._nom='';NTD._tel='';
  ntdTyping(true);ntdAddSk();
  let res;
  try{
    const r=await fetch(NTD_C.validar,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({cedula:NTD._ced,nombre:'',telefono:''})});
    res=r.ok?await r.json():{ok:false,razon:'error_api'};
  }catch(e){res={ok:false,razon:'error_red'};}
  ntdRmSk();ntdTyping(false);

  if(!res.ok){
    const msg=res.msg||'No encontramos su registro en nuestra base de datos. Verifique su número de documento, comuníquese al 604 322 2432 o escríbanos al WhatsApp 304 341 2431.';
    ntdShowVal(msg);
    NTD.fase='ident_ced';NTD._ced=null;
    ntdAddMsg('nova',ntdR2H('Intentemos de nuevo. Por favor ingrese su **número de documento**:'));
    ntdEna('Por favor escriba su número de documento...');return;
  }
  const pn=(res.nombre||'').trim().split(/\s+/)[0];
  NTD.usuario={nombre:res.nombre||'',primerNombre:pn,cedula:NTD._ced,telefono:'',vip:!!res.vip,saludo:res.saludo||null,ciudad:res.ciudad||null,epsRegistrada:res.eps||null};
  NTD.eps=(res.eps||'').replace('SAVIA SALUD','SAVIA').replace('PREVENTIVA SALUD','PREVENTIVA')||null; // EPS directo desde la BD — no preguntar
  if(res.vip&&res.saludo){NTD.vipCb=()=>ntdBienvenidaYEps();ntdShowVip(res.saludo);}
  else{ ntdBienvenidaYEps(); }
  ntdAbrirSesion(); // registrar sesión en Supabase
}

  // Normalizar: quitar tildes y pasar a mayúsculas para comparar con sedes
  const _normMun=m=>(m||'').toUpperCase().trim().replace(/, ANTIOQUIA$/,'')
    .replace(/[ÁÀÂÄ]/g,'A').replace(/[ÉÈÊË]/g,'E')
    .replace(/[ÍÌÎÏ]/g,'I').replace(/[ÓÒÔÖ]/g,'O')
    .replace(/[ÚÙÛÜ]/g,'U').replace(/Ñ/g,'N');
  const ciudadInscrita = _normMun(NTD.usuario.ciudad || '');

  // Cargar sedes de Supabase (con fallback a local)
  let todasSedes=[];
  try{
    const sbUrl=(typeof window.SUPABASE_URL!=='undefined'?window.SUPABASE_URL:'');
    const sbKey=(typeof window.SUPABASE_KEY!=='undefined'?window.SUPABASE_KEY:'');
    const r=await fetch(sbUrl+'/rest/v1/sedes?activa=eq.true&select=nombre,ciudad,direccion,telefono,lat,lng,eps,horario,municipio_norm',{
      headers:{'apikey':sbKey,'Authorization':'Bearer '+sbKey}});

      const en=(e||'').toUpperCase().replace('SAVIA SALUD','SAVIA').replace('PREVENTIVA SALUD','PREVENTIVA');

function ntdOpc(n){
  NTD.busy=false;

  const _menuLabels={1:'Medicamentos',2:'Sedes',3:'Requisitos',4:'Radicar',5:'Radicado',6:'Horarios',7:'Encuesta',8:'PreguntaLibre'};
  if(_menuLabels[n]) NTD._menuUsados.push(_menuLabels[n]);
  ntdEna('Por favor escriba su respuesta...');
  var opc={1:ntdMedicamentos,2:ntdSedes,3:ntdRequisitosReclamar,
    4:ntdIrARadicar,5:ntdConsultarRadicado,6:ntdHorarios,
    7:ntdEncuesta,8:ntdConsultaPersonalizada};
  if(opc[n]) opc[n]();
}

function ntdNormMun(txt){
  const t=(txt||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim();
  if(MUNICIPIOS_MAP[t]) return MUNICIPIOS_MAP[t];
  if(MUNICIPIOS_MAP[(txt||'').toLowerCase().trim()]) return MUNICIPIOS_MAP[(txt||'').toLowerCase().trim()];
  return (txt||'').toUpperCase().trim()
    .replace(/, ANTIOQUIA$/i,'')
    .replace(/[\u00C1\u00C0\u00C2\u00C4]/g,'A').replace(/[\u00C9\u00C8\u00CA\u00CB]/g,'E')
    .replace(/[\u00CD\u00CC\u00CE\u00CF]/g,'I').replace(/[\u00D3\u00D2\u00D4\u00D6]/g,'O')
    .replace(/[\u00DA\u00D9\u00DB\u00DC]/g,'U').replace(/\u00D1/g,'N');
}

const ntdHav2=(lat1,lng1,lat2,lng2)=>{
  const R=6371,dLat=(lat2-lat1)*Math.PI/180,dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
};

async function ntdFetchSedes(mun){
  NTD.fase='libre';

    ntdRmSk();ntdTyping(false);
    ntdSedes();
    return;
  }
  ntdTyping(true);ntdAddSk();
  const eps=(NTD.eps||'').toUpperCase().trim();
  const munNorm=ntdNormMun(mun);

  // Consultar Supabase directamente — traer TODAS las sedes activas
  const sbUrl=(typeof window.SUPABASE_URL!=='undefined'?window.SUPABASE_URL:'');
  const sbKey=(typeof window.SUPABASE_KEY!=='undefined'?window.SUPABASE_KEY:'');
  let todasSedes=[];
  try{
    const r=await fetch(sbUrl+'/rest/v1/sedes?activa=eq.true&select=nombre,ciudad,direccion,telefono,lat,lng,eps,modelo,horario,municipio_norm',{
      headers:{apikey:sbKey,Authorization:'Bearer '+sbKey,'Content-Type':'application/json'}
    });
    todasSedes=await r.json();
    if(!Array.isArray(todasSedes))todasSedes=[];
  }catch(e){todasSedes=[];}

  if(!todasSedes.length){

    ntdEna('Por favor escriba su respuesta...');return;
  }

  // Filtrar por EPS en el cliente (campo eps es array JSON en Supabase)
  const sedesPorEps=eps?todasSedes.filter(s=>{
    try{
      let arr=[];
      if(Array.isArray(s.eps)) arr=s.eps;
      else if(typeof s.eps==='string'){
        const t=s.eps.trim();
        if(t.startsWith('{')) arr=t.slice(1,-1).split(',').map(e=>e.trim().replace(/"/g,''));
        else try{arr=JSON.parse(t);}catch(e){arr=[];}
      }
      // Normalizar: SAVIA SALUD == SAVIA, SAVIA == SAVIA SALUD
      const epsNorm=eps.replace('SAVIA SALUD','SAVIA').replace('PREVENTIVA SALUD','PREVENTIVA');
      return arr.some(e=>{const en=(e||'').toUpperCase().replace('SAVIA SALUD','SAVIA').replace('PREVENTIVA SALUD','PREVENTIVA');return en===epsNorm||en===eps;});
    }catch(e){return false;}
  }):todasSedes;

  // Obtener coordenadas de referencia: GPS del usuario o coordenadas del municipio consultado
  let refLat=NTD._geoLat, refLng=NTD._geoLng;

  // Sedes en el municipio consultado (con la EPS)
  const sedesEnMun=sedesPorEps.filter(s=>(s.municipio_norm||'').toUpperCase()===munNorm);

  if(sedesEnMun.length){
    // Hay sedes en ese municipio → mostrarlas
    let ord=sedesEnMun;

      ord=sedesEnMun.map(s=>({...s,_dist:parseFloat(s.lat||0)!==0?ntdHav2(refLat,refLng,parseFloat(s.lat),parseFloat(s.lng)):9999})).sort((a,b)=>a._dist-b._dist);

function ntdParseAct(raw){
  let text=raw,act=null,dat=null;
  const pp=[[/\[FORMULARIO\]/,'FORMULARIO'],[/\[ESCALAR\]/,'ESCALAR'],[/\[ENCUESTA\]/,'ENCUESTA'],
    [/\[MENU\]/,'MENU'],[/\[CAMBIAR_EPS\]/,'CAMBIAR_EPS'],[/\[MEDICAMENTOS\]/,'MEDICAMENTOS'],
    [/\[REQUISITOS\]/,'REQUISITOS'],
    [/\[CONSULTAR:([^\]]+)\]/,'CONSULTAR'],[/\[SEDES:([^\]]+)\]/,'SEDES']];
  for(const[re,a]of pp){const m=text.match(re);if(m){text=text.replace(m[0],'').trim();act=a;dat=m[1]||null;break;}}
  // Limpiar CUALQUIER tag residual que GPT haya dejado en el texto
  text=text.replace(/\[[A-Z_]+(?::[^\]]+)?\]/g,'').trim();
  return{text,act,dat};
}

/* ── AUDIO WHATSAPP STYLE ── */
let ntdRecActive=false, ntdRec=null, ntdRecSecs=0, ntdRecTimer=null;

function ntdShowRecUI(on){
  var bar=ntd$('ntdRecBar'),ta=ntd$('ntdTa'),sb=ntd$('ntdSBtn'),vb=ntd$('ntdVBtn'),lbl=ntd$('ntdMicLbl');
  if(on){
    if(bar)bar.style.display='flex';
    if(ta)ta.style.display='none';
    if(sb)sb.style.display='none';
    if(vb){
      vb.style.background='linear-gradient(135deg,#00c39a,#059669)';
      vb.style.boxShadow='0 0 0 4px rgba(0,195,154,.25),0 0 16px rgba(0,195,154,.4)';
      vb.style.animation='ntdMicPulse 1s ease-in-out infinite';
      vb.title='Presiona de nuevo para enviar';
    }
    if(lbl){lbl.textContent='🎙️ Grabando... presiona de nuevo para enviar';lbl.style.display='block';}
  }else{
    if(bar)bar.style.display='none';
    if(ta)ta.style.display='';
    if(sb)sb.style.display='';
    if(vb){
      vb.style.background='';
      vb.style.boxShadow='';
      vb.style.animation='';
      vb.title='Grabar';
    }
    if(lbl){lbl.style.display='none';}
    var rt=ntd$('ntdRecTime');if(rt)rt.textContent='0:00';
  }
}

function ntdStartRecTimer(){
  ntdRecSecs = 0;
  clearInterval(ntdRecTimer);
  ntdRecTimer = setInterval(()=>{
    ntdRecSecs++;
    const m = Math.floor(ntdRecSecs/60);
    const s = String(ntdRecSecs%60).padStart(2,'0');
    ntd$('ntdRecTime').textContent = m+':'+s;
    // Límite 2 minutos
    if(ntdRecSecs >= 120) ntdStopRec();
  }, 1000);
}

function ntdStopRec(){
  clearInterval(ntdRecTimer);
  if(ntdRec) ntdRec.stop();
}

function ntdCancelRec(){
  clearInterval(ntdRecTimer);
  ntdRecActive = false;
  if(ntdRec){ ntdRec.onresult=null; ntdRec.stop(); }
  ntdShowRecUI(false);
  ntdAH(ntd$('ntdTa'));
  ntdUS();
}

function ntdToggleVoz(){if(ntdRecActive)ntdStopRec();else ntdStartRec();}
var ntdRecChunks=[];
async function ntdStartRec(){
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){ntd$('ntdTa').focus();return;}
  try{
    var stream=await navigator.mediaDevices.getUserMedia({audio:true});
    ntdRecChunks=[];
    var mime=MediaRecorder.isTypeSupported('audio/webm')?'audio/webm':'audio/mp4';
    ntdRec=new MediaRecorder(stream,{mimeType:mime});
    ntdRec.ondataavailable=function(e){if(e.data&&e.data.size>0)ntdRecChunks.push(e.data);};
    ntdRec.onstop=async function(){
      stream.getTracks().forEach(function(t){t.stop();});
      await ntdProcesarAudio(new Blob(ntdRecChunks,{type:mime}));
    };
    ntdRec.start(200);
    ntdRecActive=true;ntdRecSecs=0;ntdShowRecUI(true);
    ntdRecTimer=setInterval(function(){
      ntdRecSecs++;
      var el=ntd$('ntdRecTime');if(el)el.textContent=Math.floor(ntdRecSecs/60)+':'+(ntdRecSecs%60<10?'0':'')+ntdRecSecs%60;
      if(ntdRecSecs>=120)ntdStopRec();
    },1000);
  }catch(e){
    var t=document.createElement('div');
    t.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#dc2626;color:#fff;padding:8px 16px;border-radius:8px;font-size:12px;z-index:9999';
    t.textContent='Sin permiso de microfono';document.body.appendChild(t);setTimeout(function(){t.remove();},3000);
  }
}
function ntdStopRec(){
  if(!ntdRecActive)return;
  clearInterval(ntdRecTimer);ntdRecActive=false;ntdShowRecUI(false);
  if(ntdRec&&ntdRec.state!=='inactive')ntdRec.stop();
}
async function ntdProcesarAudio(blob){
  ntdTyping(true);ntdAddSk();
  try{
    var reader=new FileReader();
    var b64=await new Promise(function(res){reader.onload=function(e){res(e.target.result.split(',')[1]);};reader.readAsDataURL(blob);});
    var prx=(typeof window.NOVA_PROXY!=='undefined'?window.NOVA_PROXY:'/nova-proxy.php');
    var r=await fetch(prx,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({action:'whisper',audio_base64:b64,mime_type:blob.type||'audio/webm'})});
    var d=await r.json();var txt=(d.text||'').trim();
    ntdRmSk();ntdTyping(false);
    if(txt){
      ntdAddMsg('user',ntdR2H(txt.toUpperCase()));
      NTD.hist.push({role:'user',content:txt.toUpperCase()});
      await ntdFLibre('');
    }else{
      ntdAddMsg('nova',ntdR2H('No pude entender el audio. Escriba su mensaje.'));
      ntdEna();
    }
  }catch(e){
    ntdRmSk();ntdTyping(false);
    ntdAddMsg('nova',ntdR2H('Error al procesar audio.'));
    ntdEna();
  }
}
