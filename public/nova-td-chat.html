<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Nova TD · Tododrogas</title>
<script src="config.js" onerror="console.warn('config.js no cargó')"></script>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#03060f;--s1:#080f1e;--s2:#0d1628;--s3:#132035;
  --bdr:rgba(255,255,255,.07);--bdr2:rgba(37,99,235,.25);
  --blue:#1d6ae5;--bd:#1452c8;--bl:rgba(29,106,229,.13);
  --cyan:#38bdf8;--green:#22c55e;--gold:#f59e0b;--red:#ef4444;
  --t:rgba(240,246,255,.96);--t2:rgba(180,210,255,.62);--t3:rgba(110,150,210,.35);
  --f:'Sora',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:var(--f);background:var(--bg);color:var(--t);overflow:hidden}

/* APP */
.app{display:flex;flex-direction:column;height:100dvh;max-width:680px;margin:0 auto}
.app::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 80% 55% at 5% 0%,rgba(29,106,229,.08) 0%,transparent 55%),
             radial-gradient(ellipse 55% 45% at 95% 100%,rgba(56,189,248,.05) 0%,transparent 50%)}
.app>*{position:relative;z-index:1}

/* HEADER */
.hdr{flex-shrink:0;display:flex;align-items:center;gap:11px;padding:11px 15px;
  background:rgba(3,6,15,.97);border-bottom:1px solid var(--bdr);backdrop-filter:blur(20px)}
.hav{width:40px;height:40px;border-radius:50%;flex-shrink:0;overflow:hidden;position:relative;
  box-shadow:0 0 0 2px rgba(29,106,229,.5),0 0 16px rgba(29,106,229,.22)}
.hav img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.odot{position:absolute;bottom:1px;right:1px;width:11px;height:11px;border-radius:50%;
  background:var(--green);border:2px solid var(--bg);box-shadow:0 0 7px rgba(34,197,94,.7);
  animation:bl 2s infinite}
@keyframes bl{0%,100%{opacity:1}50%{opacity:.3}}
.hinfo{flex:1;min-width:0}
.hname{font-size:13px;font-weight:700}
.hsub{font-size:10.5px;color:var(--green);display:flex;align-items:center;gap:5px;margin-top:1px}
.tdots{display:none;align-items:center;gap:3px}
.tdots.on{display:flex}
.td{width:4px;height:4px;border-radius:50%;background:var(--green);animation:tb .65s ease-in-out infinite}
.td:nth-child(2){animation-delay:.13s}.td:nth-child(3){animation-delay:.26s}
@keyframes tb{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
.hstep{font-size:10px;font-weight:600;padding:3px 9px;border-radius:99px;
  background:var(--bl);border:1px solid var(--bdr2);color:rgba(147,197,253,.8);white-space:nowrap;flex-shrink:0}

/* PROGRESO */
.pbar{flex-shrink:0;height:2px;background:rgba(255,255,255,.04)}
.pfill{height:100%;background:linear-gradient(90deg,var(--bd),var(--blue),var(--cyan));
  transition:width .5s ease;box-shadow:0 0 8px rgba(29,106,229,.5)}

/* MENSAJES */
.msgs{flex:1;overflow-y:auto;padding:14px 12px 6px;display:flex;flex-direction:column;gap:2px;scroll-behavior:smooth}
.msgs::-webkit-scrollbar{width:3px}
.msgs::-webkit-scrollbar-thumb{background:rgba(29,106,229,.22);border-radius:99px}
.sep{text-align:center;font-size:10px;color:var(--t3);letter-spacing:.4px;
  margin:10px 0 4px;display:flex;align-items:center;gap:7px}
.sep::before,.sep::after{content:'';flex:1;height:1px;background:var(--bdr)}

/* FILAS */
.mr{display:flex;gap:8px;animation:mi .22s cubic-bezier(.22,1,.36,1) both}
@keyframes mi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.mr.u{flex-direction:row-reverse}
.mav2{width:28px;height:28px;border-radius:50%;flex-shrink:0;align-self:flex-end;overflow:hidden}
.mav2.n{box-shadow:0 0 8px rgba(29,106,229,.32)}
.mav2.n img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.mav2.us{background:linear-gradient(135deg,#0f766e,#0d9488);display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700}
.mb{max-width:calc(100% - 38px)}
.mr.u .mb{display:flex;flex-direction:column;align-items:flex-end}
.bub{padding:9px 13px;border-radius:16px;font-size:13px;line-height:1.58;word-break:break-word}
.bub.n{background:var(--s2);border:1px solid rgba(29,106,229,.12);border-bottom-left-radius:4px}
.bub.u{background:linear-gradient(135deg,var(--bd),var(--blue));border-bottom-right-radius:4px;
  color:#fff;box-shadow:0 3px 13px rgba(29,106,229,.38)}
.bub p{margin-bottom:4px}.bub p:last-child{margin-bottom:0}
.bub strong{font-weight:600;color:#93c5fd}.bub.u strong{color:#fff}
.bub ul{padding:0;margin:4px 0;list-style:none}
.bub li{padding:2px 0 2px 13px;position:relative}
.bub li::before{content:'›';position:absolute;left:0;color:var(--cyan);font-weight:700}
.bub a{color:#93c5fd;text-decoration:underline}
.mt{font-size:10px;color:var(--t3);margin-top:2px;padding:0 3px}

/* SKELETON */
.sk{display:flex;gap:8px}
.skb{display:flex;gap:5px;align-items:center;padding:10px 13px;
  background:var(--s2);border:1px solid rgba(29,106,229,.1);
  border-radius:16px;border-bottom-left-radius:4px}
.skd{width:6px;height:6px;border-radius:50%;background:rgba(29,106,229,.4);
  animation:sp 1s ease-in-out infinite}
.skd:nth-child(2){animation-delay:.18s}.skd:nth-child(3){animation-delay:.36s}
@keyframes sp{0%,100%{opacity:.25;transform:scale(.8)}50%{opacity:1;transform:scale(1.2)}}

/* CHIPS */
.chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.ch{display:inline-flex;align-items:center;gap:4px;padding:6px 12px;border-radius:99px;
  font-size:11.5px;font-weight:600;cursor:pointer;border:1px solid;
  transition:all .15s;white-space:nowrap;font-family:var(--f);background:none}
.ch.b{background:var(--bl);border-color:rgba(29,106,229,.35);color:#93c5fd}
.ch.b:hover{background:rgba(29,106,229,.22);transform:translateY(-1px)}
.ch.g{background:rgba(34,197,94,.1);border-color:rgba(34,197,94,.3);color:#86efac}
.ch.g:hover{background:rgba(34,197,94,.18);transform:translateY(-1px)}
.ch.go{background:rgba(245,158,11,.1);border-color:rgba(245,158,11,.3);color:#fcd34d}
.ch.go:hover{background:rgba(245,158,11,.18);transform:translateY(-1px)}
.ch.r{background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.3);color:#fca5a5}
.ch.r:hover{background:rgba(239,68,68,.18);transform:translateY(-1px)}

/* SEDE CARD */
.sc{background:var(--s1);border:1px solid var(--bdr2);border-radius:12px;padding:11px 13px;margin-top:6px}
.sc-h{display:flex;align-items:center;gap:6px;margin-bottom:6px;flex-wrap:wrap}
.sc-tag{font-size:9px;font-weight:700;padding:2px 7px;border-radius:99px;letter-spacing:.3px;text-transform:uppercase}
.sc-p{background:rgba(29,106,229,.18);color:#93c5fd}
.sc-a{background:rgba(56,189,248,.12);color:#7dd3fc}
.sc-name{font-size:12px;font-weight:700}
.sc-row{display:flex;gap:7px;font-size:11px;color:var(--t2);padding:3px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.sc-row:last-child{border:none}
.sc-lbl{color:var(--t3);min-width:62px;flex-shrink:0;font-size:10px}
.dist{display:inline-flex;align-items:center;gap:3px;background:rgba(34,197,94,.1);
  border:1px solid rgba(34,197,94,.22);border-radius:99px;padding:2px 8px;
  font-size:10px;color:#86efac;font-weight:600;margin-left:auto}

/* INACTIVIDAD BANNER */
.inact-banner{
  margin:6px 12px;padding:9px 14px;border-radius:10px;
  background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.22);
  font-size:12px;color:rgba(245,158,11,.9);text-align:center;
  animation:mi .3s ease both;
}

/* QUICK BAR */
.qbar{flex-shrink:0;padding:5px 12px 2px;display:flex;gap:5px;overflow-x:auto;scrollbar-width:none}
.qbar::-webkit-scrollbar{display:none}
.qc{flex-shrink:0;display:inline-flex;align-items:center;gap:3px;padding:5px 10px;border-radius:99px;
  font-size:11px;font-weight:500;white-space:nowrap;cursor:pointer;
  background:var(--s2);border:1px solid var(--bdr);color:var(--t2);transition:all .15s}
.qc:hover{background:var(--bl);border-color:var(--bdr2);color:#93c5fd}

/* INPUT */
.ia{flex-shrink:0;padding:6px 11px 12px;background:rgba(3,6,15,.95);border-top:1px solid var(--bdr)}
.ib{display:flex;align-items:flex-end;gap:6px;background:var(--s2);
  border:1.5px solid var(--bdr);border-radius:17px;padding:6px 6px 6px 13px;
  transition:border-color .18s,box-shadow .18s}
.ib:focus-within{border-color:rgba(29,106,229,.5);box-shadow:0 0 0 3px rgba(29,106,229,.08)}
.it{flex:1;background:none;border:none;outline:none;color:var(--t);font-family:var(--f);
  font-size:13px;line-height:1.5;resize:none;max-height:100px;min-height:21px;padding:2px 0}
.it::placeholder{color:var(--t3)}.it:disabled{opacity:.35;cursor:not-allowed}
.ibtn{width:30px;height:30px;border-radius:8px;background:none;border:1px solid var(--bdr);
  color:var(--t3);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .15s;flex-shrink:0}
.ibtn:hover{background:var(--bl);border-color:var(--bdr2);color:var(--t2)}
.ibtn.rec{background:rgba(239,68,68,.12);border-color:rgba(239,68,68,.28);color:#fca5a5}
.sbtn{width:34px;height:34px;border-radius:10px;flex-shrink:0;
  background:linear-gradient(135deg,var(--bd),var(--blue));border:none;color:#fff;font-size:14px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .18s;box-shadow:0 3px 11px rgba(29,106,229,.4)}
.sbtn:hover{transform:scale(1.08);box-shadow:0 5px 17px rgba(29,106,229,.55)}
.sbtn:active{transform:scale(.94)}
.sbtn:disabled{opacity:.3;cursor:not-allowed;transform:none;box-shadow:none}

/* MODALES */
.modal-bg{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.85);backdrop-filter:blur(18px);
  display:none;align-items:center;justify-content:center;padding:20px}
.modal-bg.on{display:flex}

/* VIP */
.vipm{position:relative;overflow:hidden;
  background:linear-gradient(160deg,rgba(10,8,2,.99),rgba(18,14,4,.99));
  border:1px solid rgba(212,175,55,.42);border-radius:4px;
  padding:42px 36px 32px;max-width:400px;width:100%;text-align:center;
  animation:mIn .45s cubic-bezier(.16,1,.3,1) both;
  box-shadow:0 0 0 1px rgba(212,175,55,.1),0 30px 80px rgba(0,0,0,.99)}
.vipm::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(212,175,55,.9) 30%,rgba(255,235,150,.6) 50%,rgba(212,175,55,.9) 70%,transparent)}
.vip-ey{font-size:9px;letter-spacing:4px;text-transform:uppercase;color:rgba(212,175,55,.6);
  margin-bottom:16px;display:flex;align-items:center;justify-content:center;gap:9px}
.vip-ey::before,.vip-ey::after{content:'';width:22px;height:1px;background:rgba(212,175,55,.38)}
.vip-mo{width:50px;height:50px;border-radius:2px;border:1px solid rgba(212,175,55,.5);
  display:flex;align-items:center;justify-content:center;margin:0 auto 18px}
.vip-mi{width:2px;height:20px;background:linear-gradient(180deg,transparent,rgba(212,175,55,.8),transparent);position:relative}
.vip-mi::before{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:20px;height:2px;background:linear-gradient(90deg,transparent,rgba(212,175,55,.8),transparent)}
.vip-msg{font-size:14px;color:rgba(230,220,200,.9);line-height:1.8;margin-bottom:22px;font-weight:300}
.vip-btn{background:none;border:1px solid rgba(212,175,55,.5);border-radius:3px;padding:9px 22px;
  font-size:11px;font-weight:600;letter-spacing:.7px;text-transform:uppercase;
  color:rgba(212,175,55,.9);cursor:pointer;font-family:var(--f);transition:all .2s}
.vip-btn:hover{background:rgba(212,175,55,.08)}

/* MODAL VALIDACIÓN */
.valm{background:var(--s2);border:1px solid rgba(239,68,68,.28);border-radius:16px;
  padding:22px;max-width:310px;width:100%;text-align:center;
  animation:mIn .28s cubic-bezier(.34,1.56,.64,1) both}
@keyframes mIn{from{opacity:0;transform:scale(.92) translateY(16px)}to{opacity:1;transform:none}}
.val-ico{font-size:30px;margin-bottom:8px}
.val-msg{font-size:12px;color:var(--t2);line-height:1.7;margin-bottom:12px}
.val-bw{height:3px;background:rgba(255,255,255,.07);border-radius:99px;overflow:hidden;margin-bottom:10px}
.val-b{height:100%;background:var(--red);border-radius:99px;width:100%;transition:width 12s linear}
.val-cd{font-size:11px;color:var(--t3);margin-bottom:12px}
.val-cl{padding:8px 20px;border-radius:9px;background:rgba(239,68,68,.12);
  border:1px solid rgba(239,68,68,.25);color:#fca5a5;font-size:12px;font-weight:600;
  cursor:pointer;font-family:var(--f)}

/* TOASTS */
#toasts{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);
  z-index:600;display:flex;flex-direction:column;gap:6px;pointer-events:none}
.tst{padding:8px 14px;border-radius:99px;font-size:12px;font-weight:600;white-space:nowrap;
  animation:tIn .25s ease,tOut .25s ease 2.7s both}
@keyframes tIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@keyframes tOut{to{opacity:0}}
.ti{background:var(--s3);border:1px solid var(--bdr2);color:#93c5fd}
.tok{background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.28);color:#86efac}
.ter{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.26);color:#fca5a5}

/* DESKTOP */
@media(min-width:680px){
  body{background:#020408;display:flex;align-items:center;justify-content:center}
  .app{height:90dvh;border-radius:20px;border:1px solid var(--bdr);overflow:hidden;
    box-shadow:0 40px 100px rgba(0,0,0,.8)}}
@media(max-width:400px){
  .hdr{padding:9px 11px}.msgs{padding:12px 10px 5px}
  .ia{padding:5px 9px 11px}.qbar{padding:4px 9px 2px}}
</style>
</head>

/* ═══════════════════════════════════════
   HAVERSINE — distancia en km
═══════════════════════════════════════ */
function haversine(lat1,lng1,lat2,lng2){
  const R=6371, dL=(lat2-lat1)*Math.PI/180, dG=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dL/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dG/2)**2;
  return Math.round(R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)));
}

function normMun(s){
  return (s||'').toUpperCase()
    .replace(/[ÁÀÂÄ]/g,'A').replace(/[ÉÈÊË]/g,'E').replace(/[ÍÌÎÏ]/g,'I')
    .replace(/[ÓÒÔÖ]/g,'O').replace(/[ÚÙÛÜ]/g,'U').replace(/Ñ/g,'N')
    .replace(/[^A-Z0-9\s]/g,'').trim();
}

function sedesCercanas(munOrigen, eps, excluir='', limite=4){
  const epN = (eps||'').toUpperCase().replace('SAVIA SALUD','SAVIA SALUD');
  const orig = SEDES.find(s=>normMun(s.municipio)===normMun(munOrigen));
  
  let candidatas = SEDES.filter(s=>{
    if(!s.lat||!s.lng) return false;
    if(excluir && normMun(s.municipio)===normMun(excluir)) return false;
    if(!epN||epN==='TODAS') return true;
    return s.eps.includes(epN)||s.eps.includes('TODAS');
  });

  if(orig?.lat&&orig?.lng){
    candidatas = candidatas.map(s=>({...s,dist:haversine(orig.lat,orig.lng,s.lat,s.lng)}))
      .sort((a,b)=>a.dist-b.dist);
  }
  return candidatas.slice(0,limite);
}

function renderSedes(lista){
  return lista.map(s=>{
    const prop = s.modelo==='PROPIO'||s.modelo==='PROPIO - PAQUETEO';
    const distHtml = s.dist!==undefined
      ? `<span class="dist">📍 ${s.dist} km</span>` : '';
    return `<div class="sc">
      <div class="sc-h">
        <span class="sc-tag ${prop?'sc-p':'sc-a'}">${prop?'SF Propio':'Aliado'}</span>
        <span class="sc-name">${s.municipio}</span>${distHtml}
      </div>
      <div class="sc-row"><span class="sc-lbl">Nombre</span><span>${s.nombre}</span></div>
      <div class="sc-row"><span class="sc-lbl">Dirección</span><span>${s.direccion||'—'}</span></div>
      ${s.telefono?`<div class="sc-row"><span class="sc-lbl">Teléfono</span><span>${s.telefono}</span></div>`:''}
      ${s.horario?`<div class="sc-row"><span class="sc-lbl">Horario</span><span>${s.horario}</span></div>`:''}
      <div class="sc-row"><span class="sc-lbl">EPS</span><span>${s.eps.join(', ')}</span></div>
    </div>`;
  }).join('');
}

/* ═══════════════════════════════════════
   RENDER HTML
═══════════════════════════════════════ */
function r2h(raw){
  if(!raw) return '';
  let t=raw.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\[([^\]]+)\]\((https?:\/\/[^)]+)\)/g,'<a href="$2" target="_blank">$1</a>');
  const lines=t.split('\n'),out=[];let ul=false;
  for(const l of lines){
    const tr=l.trim();
    if(tr.startsWith('• ')||tr.startsWith('- ')){
      if(!ul){out.push('<ul>');ul=true}
      out.push('<li>'+tr.slice(2)+'</li>');
    }else{if(ul){out.push('</ul>');ul=false}if(tr)out.push('<p>'+tr+'</p>')}
  }
  if(ul)out.push('</ul>');
  return out.join('');
}

/* ═══════════════════════════════════════
   INACTIVIDAD
═══════════════════════════════════════ */
function resetInact(){
  clearTimeout(S._inact1);clearTimeout(S._inact2);
  if(S.cerrado||S.fase!=='libre') return;

  S._inact1 = setTimeout(()=>{
    if(S.cerrado) return;
    const e=document.createElement('div');
    e.className='inact-banner';
    e.textContent='⏱ ¿Sigues ahí, '+( S.user?.pn||'')+'? Si tienes otra pregunta escríbeme, estoy aquí. Si no, ¡que tengas un excelente día! 😊';
    $('msgs').appendChild(e);scrl();
  }, C.inactividadAviso);

  S._inact2 = setTimeout(async ()=>{
    if(S.cerrado) return;
    S.cerrado = true;
    dis();
    addMsg('nova', r2h('Esta conversación fue cerrada por inactividad. ¡Que tengas un excelente día! Cuando necesites algo, aquí estaré 😊'));
    $('hTxt').textContent = 'Conversación cerrada';
    $('hTxt').style.color = 'var(--t3)';
    $('hStep').textContent = 'Cerrada';
    setQbar([]);
    // Guardar sesión en Supabase
    await guardarSesion('inactividad');
  }, C.inactividadCierre);
}

/* ═══════════════════════════════════════
   GUARDAR SESIÓN EN SUPABASE
═══════════════════════════════════════ */
async function guardarSesion(motivo='manual'){
  try{
    const resumen = S.hist.slice(-4).map(m=>
      (m.role==='user'?'Usuario':'Nova')+': '+m.content.slice(0,120)
    ).join(' | ');

    await fetch(C.consulta, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        accion      : 'guardar_sesion_nova',
        sesion_id   : S.sesionId,
        cedula      : S.user?.cedula||'',
        nombre      : S.user?.nombre||'',
        eps         : S.eps||'',
        turnos      : Math.floor(S.hist.length/2),
        resumen     : resumen,
        motivo_cierre: motivo,
        fecha       : new Date().toISOString(),
      })
    });
  }catch(e){ console.warn('guardarSesion error:', e); }
}

═══════════════════════════════════════ */
function su(txt){
  if(S.cerrado) return;
  $('ta').value=txt;aH($('ta'));uS();send();
}
async function send(){
  const ta=$('ta'),txt=ta.value.trim();
  if(!txt||S.busy||S.cerrado) return;
  ta.value='';ta.style.height='auto';uS();
  addMsg('user',r2h(txt));
  resetInact();
  S.busy=true;dis();
  try{ await dispatch(txt); }
  catch(e){
    rmSk();typing(false);
    addMsg('nova',r2h('Tuve un problema de conexión. Llama al **604 322 2432** o WhatsApp **304 341 2431**.'));
    console.error(e);
  }
  S.busy=false;uS();
}

═══════════════════════════════════════ */
async function dispatch(txt){
  if(S.fase==='politica') return fPolitica(txt);
  if(S.fase==='ced')      return fCed(txt);
  if(S.fase==='nom')      return fNom(txt);
  if(S.fase==='tel')      return fTel(txt);
  if(S.fase==='eps')      return fEps(txt);
  return fLibre(txt);
}

/* ─── IDENTIFICACIÓN ─────────────────── */
async function fCed(txt){
  const n=txt.replace(/\D/g,'');
  if(n.length<5){addMsg('nova',r2h('Debe tener al menos 5 dígitos.'));ena('Solo números');return}
  S._ced=n;S.fase='nom';
  addMsg('nova',r2h('¿Cuál es tu **nombre completo**?'));
  ena('Nombre y apellido');
}
async function fNom(txt){
  if(txt.trim().length<3){addMsg('nova',r2h('Escribe tu nombre completo.'));ena('Nombre y apellido');return}
  S._nom=txt.trim().toUpperCase();S.fase='tel';
  addMsg('nova',r2h('¿Tu **número de celular**?'));
  ena('Ej: 3001234567');
}
async function fTel(txt){
  const n=txt.replace(/\D/g,'');
  if(n.length<7){addMsg('nova',r2h('El número debe tener al menos 7 dígitos.'));ena('Solo números');return}
  S._tel=n;
  typing(true);addSk();
  let res;
  try{
    const r=await fetch(C.validar,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({cedula:S._ced,nombre:S._nom,telefono:S._tel})});
    res=r.ok?await r.json():{ok:true,razon:'error_api'};
  }catch(e){res={ok:true,razon:'error_red'}}
  rmSk();typing(false);

  if(!res.ok){
    const msg=res.msg||(res.razon==='no_encontrado'
      ?'No encontramos tu registro. Verifica tus datos o llama al 604 322 2432 / WhatsApp 304 341 2431.'
      :'Tus datos no coinciden. Verifica cédula, nombre y teléfono, o comunícate al 604 322 2432.');
    showVal(msg);
    S.fase='ced';S._ced=null;S._nom=null;S._tel=null;
    addMsg('nova',r2h('Intentemos de nuevo. ¿Cuál es tu **cédula**?'));
    ena('Número de cédula');return;
  }

  const pn=(res.nombre||S._nom).trim().split(/\s+/)[0];
  S.user={nombre:res.nombre||S._nom,pn,cedula:S._ced,telefono:S._tel,vip:!!res.vip,saludo:res.saludo||null};
  if(res.vip&&res.saludo){S.vipCb=()=>irAEps();showVip(res.saludo)}
  else{addMsg('nova',r2h(`¡Bienvenido/a, **${pn}**! ✅`));await delay(350);irAEps()}
}

/* ─── CONVERSACIÓN LIBRE GPT-4o ──────── */
async function fLibre(txt){
  S.hist.push({role:'user',content:txt});
  typing(true);addSk();
  let raw='';
  try{
    const r=await fetch(C.proxy,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({system:buildSys(),messages:S.hist.slice(-20),max_tokens:1500})
    });
    if(!r.ok) throw new Error('HTTP '+r.status);
    const d=await r.json();
    raw=d.choices?.[0]?.message?.content||'';
    if(!raw) throw new Error('empty');
  }catch(e){
    rmSk();typing(false);
    addMsg('nova',r2h('No pude conectarme ahora. Llama al **604 322 2432** o WhatsApp **304 341 2431**.'));
    console.error(e);ena();return;
  }

  S.hist.push({role:'assistant',content:raw});
  const{text,act,dat}=parseAct(raw);
  rmSk();typing(false);
  const html=r2h(text);

  switch(act){
    case 'FORMULARIO':
      addMsg('nova',html,mkChips([
        {l:'📋 Ir al formulario →',c:'b',fn:`window.location.href='${C.pqrForm}'`},
        {l:'↩ Menú',c:'b',fn:'mostrarMenu()'},
      ]));break;
    case 'ESCALAR':
      addMsg('nova',html,mkChips([
        {l:'💬 WhatsApp 304 341 2431',c:'g',fn:"window.open('https://wa.me/573043412431')"},
        {l:'📞 PBX 604 322 2432',c:'b',fn:"window.location.href='tel:6043222432'"},
        {l:'↩ Menú',c:'b',fn:'mostrarMenu()'},
      ]));break;
    case 'ENCUESTA':
      addMsg('nova',html,mkChips([
        {l:'⭐ Ir a la encuesta →',c:'go',fn:`window.location.href='${C.encuesta}'`},
        {l:'↩ Menú',c:'b',fn:'mostrarMenu()'},
      ]));break;
    case 'MENU':
      addMsg('nova',html);await delay(250);mostrarMenu();break;
    case 'CAMBIAR_EPS':
      addMsg('nova',html);await delay(250);cambiarEps();break;
    case 'CONSULTAR':
      addMsg('nova',html);await delay(150);await fetchRadicado(dat);break;
    case 'SEDES':
      addMsg('nova',html);await delay(150);mostrarSedes(dat||'');break;
    default:
      addMsg('nova',html);
      // Si la IA no usó tag pero la pregunta claramente es de sedes, mostrar igual
      if(/sede|farmacia|drogueria|reclamar|medicamento|dispensar|recoger/i.test(txt)&&
         /municipio|ciudad|pueblo|vivo|cerca|queda/i.test(txt)){
        await delay(200);mostrarSedes('');
      }
  }
  ena('Escribe tu pregunta...');
}

/* ═══════════════════════════════════════
   MOSTRAR SEDES (con distancia)
═══════════════════════════════════════ */
function mostrarSedes(munRef){
  // Detectar municipio en el contexto reciente
  let mun = munRef;
  if(!mun){
    const ultMsg = S.hist.slice(-4).map(m=>m.content).join(' ');
    for(const s of SEDES){
      if(ultMsg.toLowerCase().includes(s.municipio.toLowerCase())){
        mun=s.municipio;break;
      }
    }
  }

  const lista = sedesCercanas(mun, S.eps, '', 4);
  if(!lista.length){
    addMsg('nova',
      r2h(`No encontré sedes para **${S.eps||'tu EPS'}**${mun?' en **'+mun+'**':''}.`),
      mkChips([
        {l:'🏥 Otro municipio',c:'b',fn:"su('Sedes en otro municipio')"},
        {l:'↩ Menú',c:'b',fn:'mostrarMenu()'},
      ]));return;
  }

  const titulo = mun
    ? `<p>Sedes para <strong>${S.eps||'tu EPS'}</strong> cerca de <strong>${mun}</strong>:</p>`
    : `<p>Sedes disponibles para <strong>${S.eps||'tu EPS'}</strong>:</p>`;

  addMsg('nova', titulo+renderSedes(lista),
    mkChips([
      {l:'🏥 Otro municipio',c:'b',fn:"su('Sedes en otro municipio')"},
      {l:'🔄 Cambiar EPS',c:'b',fn:'cambiarEps()'},
      {l:'↩ Menú',c:'b',fn:'mostrarMenu()'},
    ]));
}

/* ═══════════════════════════════════════
   CONSULTAR RADICADO
═══════════════════════════════════════ */
async function fetchRadicado(ticket){
  typing(true);addSk();
  let d;
  try{
    const r=await fetch(C.consulta,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({accion:'radicado',ticket_id:ticket,correo:ticket})});
    d=await r.json();
  }catch(e){d={encontrado:false}}
  rmSk();typing(false);

  if(!d.encontrado){
    addMsg('nova',r2h(`No encontré el radicado **"${ticket}"**. Verifica el número (ej: TD-123456) o tu correo.`),
      mkChips([
        {l:'🔍 Otro radicado',c:'b',fn:"su('Consultar otro radicado')"},
        {l:'↩ Menú',c:'b',fn:'mostrarMenu()'},
      ]));return;
  }
  const est=d.estado||'pendiente';
  const fl=d.fecha_limite?new Date(d.fecha_limite).toLocaleDateString('es-CO',{day:'2-digit',month:'short',year:'numeric'}):'—';
  addMsg('nova',
    `<p>Radicado encontrado 📋</p>
     <div class="sc">
       <div class="sc-h"><span class="sc-name" style="font-family:'JetBrains Mono',monospace;color:#93c5fd">${d.ticket_id}</span></div>
       <div class="sc-row"><span class="sc-lbl">Estado</span><span>${est.toUpperCase()}${d.sla_vencido?' ⚠️':''}</span></div>
       <div class="sc-row"><span class="sc-lbl">Tipo</span><span>${d.tipo||'—'}</span></div>
       <div class="sc-row"><span class="sc-lbl">Prioridad</span><span>${d.prioridad||'media'}</span></div>
       <div class="sc-row"><span class="sc-lbl">Agente</span><span>${d.agente||'Sin asignar'}</span></div>
       <div class="sc-row"><span class="sc-lbl">Límite SLA</span><span>${fl}</span></div>
       ${d.resumen?`<div class="sc-row"><span class="sc-lbl">Resumen</span><span>${d.resumen}</span></div>`:''}
     </div>`,
    mkChips([
      {l:'🔍 Otro radicado',c:'b',fn:"su('Consultar otro radicado')"},
      est!=='cerrado'?{l:'👤 Hablar con agente',c:'g',fn:"su('Hablar con agente sobre este radicado')"}:null,

/* ═══════════════════════════════════════
   PARSEAR ACCIONES
═══════════════════════════════════════ */
function parseAct(raw){
  let text=raw,act=null,dat=null;
  const pp=[
    [/\[FORMULARIO\]/,'FORMULARIO'],[/\[ESCALAR\]/,'ESCALAR'],
    [/\[ENCUESTA\]/,'ENCUESTA'],[/\[MENU\]/,'MENU'],[/\[CAMBIAR_EPS\]/,'CAMBIAR_EPS'],
    [/\[CONSULTAR:([^\]]+)\]/,'CONSULTAR'],[/\[SEDES:([^\]]*)\]/,'SEDES'],
  ];
  for(const[re,a]of pp){const m=text.match(re);if(m){text=text.replace(m[0],'').trim();act=a;dat=m[1]||null;break}}
  return{text,act,dat};
}

  S._vt=setInterval(()=>{s--;$('valCd').textContent='Cerrando en '+s+'s…';if(s<=0)cVal()},1000);
}
function cVal(){clearInterval(S._vt);$('valBg').classList.remove('on')}

/* ═══════════════════════════════════════
   VOZ
═══════════════════════════════════════ */
let _ra=false,_r=null;
function togVoz(){
  const btn=$('vBtn');
  if(!('SpeechRecognition'in window)&&!('webkitSpeechRecognition'in window)){
    toast('Tu navegador no soporta reconocimiento de voz','er');return;
  }
  if(_ra){_r?.stop();return}
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  _r=new SR();_r.lang='es-CO';_r.continuous=false;_r.interimResults=false;
  _r.onstart=()=>{_ra=true;btn.classList.add('rec')};
  _r.onresult=e=>{const t=e.results[0][0].transcript;const ta=$('ta');ta.value=(ta.value+' '+t).trim();aH(ta);uS()};
  _r.onend=()=>{_ra=false;btn.classList.remove('rec')};
  _r.onerror=()=>{_ra=false;btn.classList.remove('rec');toast('No pude escuchar','er')};
  _r.start();
}

   ARRANQUE
═══════════════════════════════════════ */
document.addEventListener('DOMContentLoaded', startPolitica);
